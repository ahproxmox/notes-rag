# Notes RAG — Indexer Configuration
#
# All paths can be overridden via environment variables:
#   RAG_WORKSPACE    → workspace
#   RAG_CHROMA_PATH  → chroma_path

workspace: /mnt/Claude
exclude:
  - trash
  - tmp
  - temp
  - docs-archive

chunk_size: 500
chunk_overlap: 100
embedding_model: all-MiniLM-L6-v2
chroma_path: /opt/rag/chroma
rerank: true

watch_extra:
  - /mnt/Obsidian

# Wiki layer — synthesised topic pages (Todo 123 task 1)
# wiki/ pages get a score multiplier in retrieval to surface above raw notes.
# Override via env: WIKI_BOOST=1.5 (default)
wiki_boost: 1.5
