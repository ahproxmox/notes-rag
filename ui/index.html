<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d8a657">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/ui/icon.png">
  <link rel="stylesheet" href="/ui/theme.css">
  <title>Chat — Notes RAG</title>
  <style>
    /* ── Layout ─────────────────────────────────────────────────── */
    .chat-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── Messages area ───────────────────────────────────────────── */
    .chat-main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; border-right: 1px solid var(--bg-2);
    }
    .messages {
      flex: 1; overflow-y: auto;
      padding: 24px; display: flex; flex-direction: column;
      gap: 24px; scroll-behavior: smooth;
      max-width: 880px; width: 100%; align-self: center;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }

    /* ── Welcome state ───────────────────────────────────────────── */
    .welcome { margin: auto; text-align: center; max-width: 480px; padding: 40px 20px; }
    .welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--fg-2); letter-spacing: -0.01em; }
    .welcome p  { color: var(--gray-2); margin-bottom: 24px; font-size: 13px; line-height: 1.55; }
    .examples { display: flex; flex-direction: column; gap: 8px; }
    .example-btn {
      background: var(--bg-1); border: 1px solid var(--bg-2);
      color: var(--gray-2); padding: 10px 16px;
      border-radius: 6px; cursor: pointer; text-align: left;
      font-size: 13px; font-family: var(--mono);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .example-btn:hover { border-color: var(--blue); color: var(--fg-1); background: var(--bg-2); }

    /* ── Message bubbles ─────────────────────────────────────────── */
    .exchange { display: flex; flex-direction: column; gap: 12px; }

    .user-msg {
      align-self: flex-end;
      background: var(--bg-2); border: 1px solid rgba(125,174,163,0.3);
      border-radius: 6px; padding: 10px 14px;
      max-width: 75%; color: var(--fg-1); font-size: 13px; white-space: pre-wrap;
    }

    .assistant-card {
      background: var(--bg-1); border: 1px solid var(--bg-2);
      border-radius: 6px; overflow: hidden;
    }

    /* ── Answer body (markdown) ──────────────────────────────────── */
    .answer-body {
      padding: 16px; color: var(--fg-1);
      font-size: 13.5px; line-height: 1.7;
    }
    .answer-body h1, .answer-body h2, .answer-body h3 {
      font-size: 14px; font-weight: 600; margin: 12px 0 4px; color: var(--fg-2);
    }
    .answer-body p { margin-bottom: 10px; }
    .answer-body p:last-child { margin-bottom: 0; }
    .answer-body strong { font-weight: 600; color: var(--fg-2); }
    .answer-body em { font-style: italic; color: var(--gray-2); }
    .answer-body code {
      background: var(--bg-0); border: 1px solid var(--bg-3);
      border-radius: 3px; padding: 1px 5px;
      font-size: 12px; color: var(--yellow); font-family: var(--mono);
    }
    .answer-body pre {
      background: var(--bg-0); border: 1px solid var(--bg-2);
      border-radius: 6px; padding: 12px; overflow-x: auto; margin: 10px 0;
    }
    .answer-body pre code { background: none; border: none; padding: 0; color: var(--fg-1); font-size: 12px; }
    .answer-body ul, .answer-body ol { padding-left: 20px; margin-bottom: 10px; }
    .answer-body li { margin-bottom: 3px; }
    .answer-body blockquote {
      border-left: 2px solid var(--bg-3); padding-left: 12px;
      color: var(--gray-2); margin: 8px 0;
    }

    /* Streaming cursor */
    .streaming-cursor::after {
      content: '▍'; animation: blink 0.8s step-end infinite;
      color: var(--yellow); font-size: 12px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Card footer ─────────────────────────────────────────────── */
    .card-footer {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 8px 16px; border-top: 1px solid var(--bg-2);
      font-size: 12px; color: var(--gray-2);
    }
    .sources-toggle {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; user-select: none;
      transition: color 0.15s; flex: 1;
    }
    .sources-toggle:hover { color: var(--fg-1); }
    .sources-toggle .chevron { transition: transform 0.2s; font-size: 10px; }
    .sources-toggle.open .chevron { transform: rotate(90deg); }
    .sources-count {
      background: var(--bg-2); border: 1px solid var(--bg-3);
      border-radius: 999px; padding: 1px 7px; font-size: 10px;
    }
    .source-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 10px; padding: 2px 8px; border-radius: 999px;
      background: var(--aqua-dim); border: 1px solid rgba(137,180,130,0.3);
      color: var(--aqua); max-width: 180px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .chip.todo   { background: var(--yellow-dim); border-color: rgba(216,166,87,0.3); color: var(--yellow); }
    .chip.report { background: var(--purple-dim); border-color: rgba(211,134,155,0.3); color: var(--purple); }
    .latency {
      font-size: 11px; color: var(--gray-1); white-space: nowrap; flex-shrink: 0;
    }
    .latency .phase { color: var(--aqua); }

    /* ── Chunks panel ────────────────────────────────────────────── */
    .chunks-panel { display: none; flex-direction: column; gap: 1px; border-top: 1px solid var(--bg-2); }
    .chunks-panel.open { display: flex; }

    .chunk { background: var(--bg-2); overflow: hidden; }
    .chunk-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; cursor: pointer; user-select: none;
    }
    .chunk-header:hover { background: var(--bg-3); }
    .chunk-filename {
      font-size: 11px; color: var(--aqua); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .score-bar { width: 40px; height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
    .score-bar-fill { height: 100%; background: var(--yellow); border-radius: 2px; }
    .chunk-score { font-size: 10px; color: var(--yellow); font-variant-numeric: tabular-nums; }
    .chunk-expand { color: var(--gray-0); font-size: 10px; transition: transform 0.15s; }
    .chunk.expanded .chunk-expand { transform: rotate(90deg); }
    .chunk-content {
      display: none; padding: 0 16px 12px;
      font-size: 12px; color: var(--gray-2); line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      border-top: 1px solid var(--bg-3);
    }
    .chunk.expanded .chunk-content { display: block; }

    /* ── Loading ─────────────────────────────────────────────────── */
    .loading-card {
      background: var(--bg-1); border: 1px solid var(--bg-2);
      border-radius: 6px; padding: 16px;
      display: flex; align-items: center; gap: 10px;
      color: var(--gray-2); font-size: 13px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--bg-3); border-top-color: var(--aqua);
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sidebar (sources panel) ─────────────────────────────────── */
    .sources-panel-side {
      width: 320px; flex-shrink: 0; overflow-y: auto;
      background: var(--bg-0); display: flex; flex-direction: column;
      border-left: 1px solid var(--bg-2);
    }
    .sources-panel-side::-webkit-scrollbar { width: 6px; }
    .sources-panel-side::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 3px; }
    .side-header {
      padding: 14px 16px 10px;
      font-size: 10px; font-weight: 600; color: var(--gray-1);
      text-transform: uppercase; letter-spacing: 0.14em;
      border-bottom: 1px solid var(--bg-2); flex-shrink: 0;
    }
    .side-empty { padding: 24px 16px; color: var(--gray-1); font-size: 12px; text-align: center; }

    .side-chunk { border-bottom: 1px solid var(--bg-2); overflow: hidden; }
    .side-chunk-header { padding: 10px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
    .side-chunk-header:hover { background: var(--bg-1); }
    .side-chunk-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .side-chunk-filename { font-size: 11px; color: var(--aqua); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .side-chunk-score { font-size: 10px; color: var(--yellow); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .side-score-bar { width: 100%; height: 2px; background: var(--bg-3); border-radius: 2px; }
    .side-score-bar-fill { height: 100%; background: var(--yellow); border-radius: 2px; opacity: 0.7; }
    .side-chunk-preview { font-size: 11px; color: var(--gray-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .side-chunk-body {
      display: none; padding: 0 16px 12px;
      font-size: 11px; color: var(--gray-2); white-space: pre-wrap;
      word-break: break-word; line-height: 1.6;
    }
    .side-chunk.expanded .side-chunk-body { display: block; }
    .side-chunk.expanded .side-chunk-header { background: var(--bg-1); }

    /* ── Composer ────────────────────────────────────────────────── */
    .input-bar {
      border-top: 1px solid var(--bg-2); padding: 12px 24px;
      background: var(--bg-0); display: flex; gap: 10px;
      align-items: flex-end; flex-shrink: 0;
      max-width: 880px; width: 100%; align-self: center;
      box-sizing: border-box;
    }
    .input-wrap {
      flex: 1; background: var(--bg-1); border: 1px solid var(--bg-3);
      border-radius: 6px; display: flex; align-items: flex-end;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--yellow); }
    textarea {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--fg-1); font-family: var(--mono); font-size: 13px;
      padding: 10px 14px; resize: none; max-height: 120px; line-height: 1.5;
    }
    textarea::placeholder { color: var(--gray-0); }
    .send-btn {
      background: var(--yellow); color: var(--bg-dim); border: none;
      border-radius: 4px; padding: 8px 16px; cursor: pointer;
      font-size: 12px; font-weight: 700; font-family: var(--mono); flex-shrink: 0;
      transition: opacity 0.15s; align-self: flex-end; margin: 6px 6px 6px 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Wrapper for messages + input bar (centred column) */
    .chat-column {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; align-items: center;
    }

    @media (max-width: 768px) {
      .sources-panel-side { display: none; }
      .chat-main { border-right: none; }
    }
  </style>
</head>
<body>

<!-- ── Top nav ── -->
<nav class="gv-top-bar">
  <div class="gv-logo-area">
    <div class="gv-logo-mark">w</div>
    <span class="gv-breadcrumb-root">workspace</span>
    <span class="gv-breadcrumb-sep">/</span>
    <span class="gv-breadcrumb-page">chat</span>
  </div>
  <div class="gv-nav">
    <a href="/"        class="gv-nav-pill">workspace</a>
    <a href="/new"     class="gv-nav-pill">new</a>
    <a href="/notes"   class="gv-nav-pill">search</a>
    <a href="/chat"    class="gv-nav-pill active">chat</a>
    <a href="/review" class="gv-nav-pill">reports</a>
    <a href="/kanban"  class="gv-nav-pill">kanban</a>
    <a href="/projects" class="gv-nav-pill">projects</a>
  </div>
  <div class="gv-top-right">
    <span class="gv-pill green" id="chunk-pill">● live</span>
  </div>
</nav>

<!-- ── Main layout ── -->
<div class="chat-layout" style="flex:1;overflow:hidden">
  <div class="chat-column">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h2>Ask your workspace</h2>
        <p>Hybrid BM25 + vector retrieval, reranked, synthesised by Gemini Flash Lite.</p>
        <div class="examples">
          <button class="example-btn">What SSH setup do I have configured?</button>
          <button class="example-btn">How does the RAG chunking strategy work?</button>
          <button class="example-btn">What Proxmox containers are running?</button>
          <button class="example-btn">What todos are currently in progress?</button>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="query" placeholder="Ask your workspace…" rows="1"></textarea>
      </div>
      <button class="send-btn" id="send">↵ send</button>
    </div>
  </div>

  <div class="sources-panel-side" id="side-panel">
    <div class="side-header">Retrieved Chunks</div>
    <div class="side-empty" id="side-empty">Run a query to see retrieved chunks</div>
  </div>
</div>

<!-- ── Bottom bar ── -->
<div class="gv-bottom-bar">
  <span style="color:var(--blue)">●</span> chat
  <span class="sep">│</span>
  <span id="bb-chunks">— chunks</span>
  <span class="sep">│</span>
  <span>llm synthesised</span>
  <div style="flex:1"></div>
  <span class="gv-kbd">↵</span> send &nbsp;
  <span class="gv-kbd">⇧↵</span> newline
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const queryEl    = document.getElementById('query');
  const sendBtn    = document.getElementById('send');
  const sidePanel  = document.getElementById('side-panel');
  const sideEmpty  = document.getElementById('side-empty');

  // Load chunk count
  fetch('/api/stats').then(r => r.json()).then(d => {
    if (d.chunk_count) {
      document.getElementById('bb-chunks').textContent = d.chunk_count.toLocaleString() + ' chunks';
      document.getElementById('chunk-pill').textContent = '● ' + d.chunk_count.toLocaleString() + ' chunks';
    }
  }).catch(() => {});

  // Auto-resize textarea
  queryEl.addEventListener('input', () => {
    queryEl.style.height = 'auto';
    queryEl.style.height = Math.min(queryEl.scrollHeight, 120) + 'px';
  });
  queryEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  sendBtn.addEventListener('click', submit);
  document.querySelectorAll('.example-btn').forEach(btn => {
    btn.addEventListener('click', () => { queryEl.value = btn.textContent; submit(); });
  });

  async function submit() {
    const query = queryEl.value.trim();
    if (!query || sendBtn.disabled) return;

    document.getElementById('welcome')?.remove();
    queryEl.value = '';
    queryEl.style.height = 'auto';
    sendBtn.disabled = true;

    const startTime = Date.now();
    const exchange = document.createElement('div');
    exchange.className = 'exchange';

    const userMsg = document.createElement('div');
    userMsg.className = 'user-msg';
    userMsg.textContent = query;
    exchange.appendChild(userMsg);

    const loadingCard = document.createElement('div');
    loadingCard.className = 'loading-card';
    loadingCard.innerHTML = '<div class="spinner"></div><span>Retrieving…</span>';
    exchange.appendChild(loadingCard);

    messagesEl.appendChild(exchange);
    scrollToBottom();

    try {
      const response = await fetch('/api/search/stream', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({query}),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      const card = document.createElement('div');
      card.className = 'assistant-card';

      const answerBody = document.createElement('div');
      answerBody.className = 'answer-body streaming-cursor';
      card.appendChild(answerBody);

      const cardFooter = document.createElement('div');
      cardFooter.className = 'card-footer';
      card.appendChild(cardFooter);

      const chunksPanel = document.createElement('div');
      chunksPanel.className = 'chunks-panel';
      card.appendChild(chunksPanel);

      let answerText = '';
      let retrievalMs = null;
      let cardAdded = false;

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, {stream: true});
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(part.slice(6)); } catch { continue; }

          if (event.type === 'retrieved') {
            retrievalMs = Date.now() - startTime;
            loadingCard.remove();
            if (!cardAdded) { exchange.appendChild(card); cardAdded = true; }
            updateSidebar(event.chunks);
            buildChunksPanel(chunksPanel, event.chunks, event.sources, cardFooter);
          }
          if (event.type === 'token') {
            answerText += event.content;
            answerBody.innerHTML = renderMarkdown(answerText);
            scrollToBottom();
          }
          if (event.type === 'done') {
            answerBody.classList.remove('streaming-cursor');
            updateLatency(cardFooter, retrievalMs, Date.now() - startTime);
          }
        }
      }

      if (!cardAdded) { loadingCard.remove(); exchange.appendChild(card); }

    } catch (err) {
      loadingCard.remove();
      const errCard = document.createElement('div');
      errCard.className = 'assistant-card';
      errCard.innerHTML = `<div class="answer-body" style="color:var(--red)">Error: ${escHtml(err.message)}</div>`;
      exchange.appendChild(errCard);
    } finally {
      sendBtn.disabled = false;
      queryEl.focus();
      scrollToBottom();
    }
  }

  function buildChunksPanel(chunksPanel, chunks, sources, cardFooter) {
    if (!chunks || !chunks.length) return;
    const maxScore = Math.max(...chunks.map(c => c.score), 0.001);

    const toggle = document.createElement('div');
    toggle.className = 'sources-toggle';
    toggle.innerHTML = `
      <span class="chevron">▶</span>
      sources
      <span class="sources-count">${chunks.length}</span>
      <div class="source-chips">
        ${[...new Set(sources)].slice(0, 4).map(s =>
          `<span class="chip" title="${escHtml(s)}">${escHtml(s)}</span>`
        ).join('')}
      </div>`;
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      chunksPanel.classList.toggle('open');
    });
    cardFooter.appendChild(toggle);

    chunks.forEach(chunk => {
      const pct = Math.round((chunk.score / maxScore) * 100);
      const el = document.createElement('div');
      el.className = 'chunk';
      el.innerHTML = `
        <div class="chunk-header">
          <span class="chunk-expand">▶</span>
          <span class="chunk-filename">${escHtml(chunk.source)}</span>
          <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
          <span class="chunk-score">${chunk.score.toFixed(2)}</span>
        </div>
        <div class="chunk-content">${escHtml(chunk.content)}</div>`;
      el.querySelector('.chunk-header').addEventListener('click', () => el.classList.toggle('expanded'));
      chunksPanel.appendChild(el);
    });
  }

  function updateLatency(cardFooter, retrievalMs, totalMs) {
    const el = document.createElement('div');
    el.className = 'latency';
    el.innerHTML =
      `<span class="phase">retrieve</span> ${retrievalMs}ms · ` +
      `<span class="phase">total</span> ${(totalMs/1000).toFixed(1)}s`;
    cardFooter.appendChild(el);
  }

  function updateSidebar(chunks) {
    sidePanel.querySelectorAll('.side-chunk').forEach(el => el.remove());
    sideEmpty.style.display = 'none';
    if (!chunks || !chunks.length) { sideEmpty.style.display = ''; return; }
    const maxScore = Math.max(...chunks.map(c => c.score), 0.001);
    chunks.forEach(chunk => {
      const pct = Math.round((chunk.score / maxScore) * 100);
      const preview = chunk.content.replace(/\n/g, ' ').slice(0, 80);
      const el = document.createElement('div');
      el.className = 'side-chunk';
      el.innerHTML = `
        <div class="side-chunk-header">
          <div class="side-chunk-meta">
            <span class="side-chunk-filename">${escHtml(chunk.source)}</span>
            <span class="side-chunk-score">${chunk.score.toFixed(2)}</span>
          </div>
          <div class="side-score-bar"><div class="side-score-bar-fill" style="width:${pct}%"></div></div>
          <div class="side-chunk-preview">${escHtml(preview)}…</div>
        </div>
        <div class="side-chunk-body">${escHtml(chunk.content)}</div>`;
      el.querySelector('.side-chunk-header').addEventListener('click', () => el.classList.toggle('expanded'));
      sidePanel.appendChild(el);
    });
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    const blocks = [];
    text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
      const idx = blocks.length;
      blocks.push(`<pre><code>${escHtml(code.trim())}</code></pre>`);
      return `\x00BLOCK${idx}\x00`;
    });
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
    text = text.replace(/^#{1,3} (.+)$/gm, (_, h) => `<h3>${h}</h3>`);
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    text = text.replace(/((?:^- .+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    text = text.replace(/((?:^\d+\. .+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    text = text.split(/\n\n+/).map(p => {
      p = p.trim();
      if (!p) return '';
      if (/^<(h[1-6]|ul|ol|pre|blockquote)/.test(p) || p.startsWith('\x00BLOCK')) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');
    blocks.forEach((block, i) => { text = text.replace(`\x00BLOCK${i}\x00`, block); });
    return text;
  }
</script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
