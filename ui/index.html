<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Notes RAG">
  <link rel="apple-touch-icon" href="/ui/icon.png">
  <title>Notes RAG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --accent:    #58a6ff;
      --user-bg:   #1d2d3e;
      --tag-bg:    #21262d;
      --green:     #3fb950;
      --code-bg:   #1f2937;
      --radius:    8px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100%;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 999px; border: 1px solid var(--border);
      color: var(--text-muted); background: var(--tag-bg);
    }
    .badge.green { color: var(--green); border-color: #2ea04330; background: #2ea04310; }
    #home-btn, #review-btn { background: var(--tag-bg); border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; padding: 5px 12px; font-size: 12px; text-decoration: none;
      transition: border-color 0.15s, color 0.15s; }
    #home-btn:hover, #review-btn:hover { border-color: var(--accent); color: var(--text); }
    .spacer { flex: 1; }
    #chunk-count { font-size: 11px; color: var(--text-muted); font-family: 'SF Mono', monospace; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Chat panel ── */
    .chat-panel {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; border-right: 1px solid var(--border);
    }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 24px; display: flex; flex-direction: column;
      gap: 24px; scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Welcome */
    .welcome { margin: auto; text-align: center; max-width: 480px; }
    .welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .welcome p { color: var(--text-muted); margin-bottom: 24px; }
    .examples { display: flex; flex-direction: column; gap: 8px; }
    .example-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); padding: 10px 16px;
      border-radius: var(--radius); cursor: pointer;
      text-align: left; font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }
    .example-btn:hover { border-color: var(--accent); color: var(--text); }

    /* Exchange */
    .exchange { display: flex; flex-direction: column; gap: 12px; }

    .user-msg {
      align-self: flex-end; background: var(--user-bg);
      border: 1px solid #2d4a6a; border-radius: var(--radius);
      padding: 10px 14px; max-width: 75%;
      color: var(--text); font-size: 13px; white-space: pre-wrap;
    }

    .assistant-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }

    .answer-body {
      padding: 16px; color: var(--text);
      font-size: 13.5px; line-height: 1.7;
    }
    .answer-body h1, .answer-body h2, .answer-body h3 {
      font-size: 14px; font-weight: 600; margin: 12px 0 4px;
    }
    .answer-body p { margin-bottom: 10px; }
    .answer-body p:last-child { margin-bottom: 0; }
    .answer-body strong { font-weight: 600; }
    .answer-body em { font-style: italic; color: var(--text-muted); }
    .answer-body code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; font-size: 12px; color: #e3b341;
    }
    .answer-body pre {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
      overflow-x: auto; margin: 10px 0;
    }
    .answer-body pre code { background: none; border: none; padding: 0; color: var(--text); font-size: 12px; }
    .answer-body ul, .answer-body ol { padding-left: 20px; margin-bottom: 10px; }
    .answer-body li { margin-bottom: 3px; }
    .answer-body blockquote {
      border-left: 3px solid var(--border); padding-left: 12px;
      color: var(--text-muted); margin: 8px 0;
    }

    /* Cursor blink while streaming */
    .streaming-cursor::after {
      content: '▍'; animation: blink 0.8s step-end infinite;
      color: var(--accent); font-size: 12px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Card footer: sources + latency */
    .card-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted);
    }
    .sources-toggle {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; user-select: none;
      transition: color 0.15s; flex: 1;
    }
    .sources-toggle:hover { color: var(--text); }
    .sources-toggle .chevron { transition: transform 0.2s; font-size: 10px; }
    .sources-toggle.open .chevron { transform: rotate(90deg); }
    .sources-count {
      background: var(--tag-bg); border: 1px solid var(--border);
      border-radius: 999px; padding: 1px 7px; font-size: 11px;
    }
    .source-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 10px; padding: 1px 6px; border-radius: 999px;
      background: var(--tag-bg); border: 1px solid var(--border);
      color: var(--text-muted); max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .latency {
      font-size: 11px; color: var(--text-muted);
      font-family: 'SF Mono', monospace; white-space: nowrap; flex-shrink: 0;
    }
    .latency .phase { color: var(--accent); }

    /* Chunks panel (inline) */
    .chunks-panel {
      display: none; flex-direction: column;
      gap: 1px; background: var(--border);
      border-top: 1px solid var(--border);
    }
    .chunks-panel.open { display: flex; }

    .chunk { background: var(--surface2); overflow: hidden; }
    .chunk-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; cursor: pointer; user-select: none;
    }
    .chunk-header:hover { background: var(--surface); }
    .chunk-filename {
      font-size: 11px; font-family: 'SF Mono', monospace;
      color: var(--accent); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .score-bar { width: 40px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .score-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; }
    .chunk-score { font-size: 10px; color: var(--text-muted); font-family: monospace; }
    .chunk-expand { color: var(--text-muted); font-size: 10px; transition: transform 0.15s; }
    .chunk.expanded .chunk-expand { transform: rotate(90deg); }
    .chunk-content {
      display: none; padding: 0 16px 12px;
      font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-muted); line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
      border-top: 1px solid var(--border);
    }
    .chunk.expanded .chunk-content { display: block; }

    /* Loading */
    .loading-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      display: flex; align-items: center; gap: 10px;
      color: var(--text-muted); font-size: 13px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sidebar ── */
    .sources-panel-side {
      width: 340px; flex-shrink: 0; overflow-y: auto;
      background: var(--surface); display: flex; flex-direction: column;
    }
    .sources-panel-side::-webkit-scrollbar { width: 6px; }
    .sources-panel-side::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .side-header {
      padding: 14px 16px 10px; font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.6px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .side-empty { padding: 24px 16px; color: var(--text-muted); font-size: 12px; text-align: center; }

    .side-chunk { border-bottom: 1px solid var(--border); overflow: hidden; }
    .side-chunk-header { padding: 10px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
    .side-chunk-header:hover { background: var(--surface2); }
    .side-chunk-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .side-chunk-filename {
      font-size: 11px; font-family: 'SF Mono', monospace;
      color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .side-chunk-score { font-size: 10px; color: var(--text-muted); font-family: monospace; flex-shrink: 0; }
    .side-score-bar { width: 100%; height: 2px; background: var(--border); border-radius: 2px; }
    .side-score-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; opacity: 0.7; }
    .side-chunk-preview {
      font-size: 11px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .side-chunk-body {
      display: none; padding: 0 16px 12px;
      font-size: 11px; font-family: 'SF Mono', monospace;
      color: var(--text-muted); white-space: pre-wrap;
      word-break: break-word; line-height: 1.6;
    }
    .side-chunk.expanded .side-chunk-body { display: block; }
    .side-chunk.expanded .side-chunk-header { background: var(--surface2); }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border); padding: 12px 24px;
      background: var(--surface); display: flex; gap: 10px;
      align-items: flex-end; flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); display: flex; align-items: flex-end;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    textarea {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 13px;
      padding: 10px 14px; resize: none; max-height: 120px; line-height: 1.5;
    }
    textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      background: var(--accent); color: #0d1117; border: none;
      border-radius: 6px; padding: 8px 16px; cursor: pointer;
      font-size: 13px; font-weight: 600; flex-shrink: 0;
      transition: opacity 0.15s; align-self: flex-end; margin: 6px 6px 6px 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 768px) {
      .sources-panel-side { display: none; }
      .chat-panel { border-right: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>Notes RAG</h1>
  <span class="badge green">● live</span>
  <a href="/" id="home-btn">← Home</a>
  <a href="/review" id="review-btn">Review Notes</a>
  <span class="spacer"></span>
</header>

<div class="layout">
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h2>Ask your workspace</h2>
        <p>Hybrid BM25 + vector retrieval, reranked, synthesised by Gemini Flash Lite.</p>
        <div class="examples">
          <button class="example-btn">What SSH setup do I have configured?</button>
          <button class="example-btn">How does the RAG chunking strategy work?</button>
          <button class="example-btn">What Proxmox containers are running?</button>
          <button class="example-btn">What todos are currently in progress?</button>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="query" placeholder="Ask your workspace..." rows="1"></textarea>
      </div>
      <button class="send-btn" id="send">Send</button>
    </div>
  </div>

  <div class="sources-panel-side" id="side-panel">
    <div class="side-header">Retrieved Chunks</div>
    <div class="side-empty" id="side-empty">Run a query to see retrieved chunks</div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const queryEl    = document.getElementById('query');
  const sendBtn    = document.getElementById('send');
  const sidePanel  = document.getElementById('side-panel');
  const sideEmpty  = document.getElementById('side-empty');

  // Stats loaded but not displayed

  // Auto-resize textarea
  queryEl.addEventListener('input', () => {
    queryEl.style.height = 'auto';
    queryEl.style.height = Math.min(queryEl.scrollHeight, 120) + 'px';
  });

  queryEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  });

  sendBtn.addEventListener('click', submit);

  document.querySelectorAll('.example-btn').forEach(btn => {
    btn.addEventListener('click', () => { queryEl.value = btn.textContent; submit(); });
  });

  async function submit() {
    const query = queryEl.value.trim();
    if (!query || sendBtn.disabled) return;

    document.getElementById('welcome')?.remove();
    queryEl.value = '';
    queryEl.style.height = 'auto';
    sendBtn.disabled = true;

    const startTime = Date.now();

    // Build exchange
    const exchange = document.createElement('div');
    exchange.className = 'exchange';

    const userMsg = document.createElement('div');
    userMsg.className = 'user-msg';
    userMsg.textContent = query;
    exchange.appendChild(userMsg);

    const loadingCard = document.createElement('div');
    loadingCard.className = 'loading-card';
    loadingCard.innerHTML = '<div class="spinner"></div><span>Retrieving…</span>';
    exchange.appendChild(loadingCard);

    messagesEl.appendChild(exchange);
    scrollToBottom();

    try {
      const response = await fetch('/api/search/stream', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({query}),
      });

      const reader = response.body.getReader();

      const decoder = new TextDecoder();
      let buffer = '';

      // Elements built as events arrive
      const card = document.createElement('div');
      card.className = 'assistant-card';

      const answerBody = document.createElement('div');
      answerBody.className = 'answer-body streaming-cursor';
      card.appendChild(answerBody);

      const cardFooter = document.createElement('div');
      cardFooter.className = 'card-footer';
      card.appendChild(cardFooter);

      const chunksPanel = document.createElement('div');
      chunksPanel.className = 'chunks-panel';
      card.appendChild(chunksPanel);

      let answerText = '';
      let retrievalMs = null;
      let cardAdded = false;

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, {stream: true});
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(part.slice(6)); } catch { continue; }

          if (event.type === 'retrieved') {
            retrievalMs = Date.now() - startTime;

            // Swap loading card for answer card
            loadingCard.remove();
            if (!cardAdded) {
              exchange.appendChild(card);
              cardAdded = true;
            }

            // Update loading label while LLM generates
            loadingCard.querySelector('span').textContent = 'Generating…';

            // Populate sidebar immediately
            updateSidebar(event.chunks);

            // Build inline chunks
            buildChunksPanel(chunksPanel, event.chunks, event.sources, cardFooter);
          }

          if (event.type === 'token') {
            answerText += event.content;
            answerBody.innerHTML = renderMarkdown(answerText);
            scrollToBottom();
          }

          if (event.type === 'done') {
            answerBody.classList.remove('streaming-cursor');
            const totalMs = Date.now() - startTime;
            updateLatency(cardFooter, retrievalMs, totalMs);
          }
        }
      }

      // Fallback if card wasn't added (empty response)
      if (!cardAdded) {
        loadingCard.remove();
        exchange.appendChild(card);
      }

    } catch (err) {
      loadingCard.remove();
      const errCard = document.createElement('div');
      errCard.className = 'assistant-card';
      errCard.innerHTML = `<div class="answer-body" style="color:#f85149">Error: ${escHtml(err.message)}</div>`;
      exchange.appendChild(errCard);
    } finally {
      sendBtn.disabled = false;
      queryEl.focus();
      scrollToBottom();
    }
  }

  function buildChunksPanel(chunksPanel, chunks, sources, cardFooter) {
    if (!chunks || chunks.length === 0) return;

    const maxScore = Math.max(...chunks.map(c => c.score), 0.001);

    // Footer: toggle + source chips + latency placeholder
    const toggle = document.createElement('div');
    toggle.className = 'sources-toggle';
    toggle.innerHTML = `
      <span class="chevron">▶</span>
      <span class="sources-count">${chunks.length}</span>
      <span>sources</span>
      <div class="source-chips">
        ${[...new Set(sources)].slice(0, 4).map(s =>
          `<span class="chip" title="${escHtml(s)}">${escHtml(s)}</span>`
        ).join('')}
      </div>`;

    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      chunksPanel.classList.toggle('open');
    });

    // Insert toggle before latency slot
    cardFooter.appendChild(toggle);

    chunks.forEach(chunk => {
      const pct = Math.round((chunk.score / maxScore) * 100);
      const el = document.createElement('div');
      el.className = 'chunk';
      el.innerHTML = `
        <div class="chunk-header">
          <span class="chunk-filename">${escHtml(chunk.source)}</span>
          <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
          <span class="chunk-score">${chunk.score.toFixed(5)}</span>
          <span class="chunk-expand">▶</span>
        </div>
        <div class="chunk-content">${escHtml(chunk.content)}</div>`;
      el.querySelector('.chunk-header').addEventListener('click', () => el.classList.toggle('expanded'));
      chunksPanel.appendChild(el);
    });
  }

  function updateLatency(cardFooter, retrievalMs, totalMs) {
    const el = document.createElement('div');
    el.className = 'latency';
    el.innerHTML =
      `<span class="phase">retrieved</span> ${retrievalMs}ms · ` +
      `<span class="phase">total</span> ${(totalMs / 1000).toFixed(1)}s`;
    cardFooter.appendChild(el);
  }

  function updateSidebar(chunks) {
    sidePanel.querySelectorAll('.side-chunk').forEach(el => el.remove());
    sideEmpty.style.display = 'none';
    if (!chunks || chunks.length === 0) { sideEmpty.style.display = ''; return; }

    const maxScore = Math.max(...chunks.map(c => c.score), 0.001);

    chunks.forEach(chunk => {
      const pct = Math.round((chunk.score / maxScore) * 100);
      const preview = chunk.content.replace(/\n/g, ' ').slice(0, 80);
      const el = document.createElement('div');
      el.className = 'side-chunk';
      el.innerHTML = `
        <div class="side-chunk-header">
          <div class="side-chunk-meta">
            <span class="side-chunk-filename">${escHtml(chunk.source)}</span>
            <span class="side-chunk-score">${chunk.score.toFixed(5)}</span>
          </div>
          <div class="side-score-bar"><div class="side-score-bar-fill" style="width:${pct}%"></div></div>
          <div class="side-chunk-preview">${escHtml(preview)}…</div>
        </div>
        <div class="side-chunk-body">${escHtml(chunk.content)}</div>`;
      el.querySelector('.side-chunk-header').addEventListener('click', () => el.classList.toggle('expanded'));
      sidePanel.appendChild(el);
    });
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    const blocks = [];
    text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) => {
      const idx = blocks.length;
      blocks.push(`<pre><code>${escHtml(code.trim())}</code></pre>`);
      return `\x00BLOCK${idx}\x00`;
    });
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
    text = text.replace(/^#{1,3} (.+)$/gm, (_, h) => `<h3>${h}</h3>`);
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    text = text.replace(/((?:^- .+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    text = text.replace(/((?:^\d+\. .+\n?)+)/gm, match => {
      const items = match.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
    text = text.split(/\n\n+/).map(p => {
      p = p.trim();
      if (!p) return '';
      if (/^<(h[1-6]|ul|ol|pre|blockquote)/.test(p) || p.startsWith('\x00BLOCK')) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');
    blocks.forEach((block, i) => { text = text.replace(`\x00BLOCK${i}\x00`, block); });
    return text;
  }
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }
</script>
</body>
</html>
