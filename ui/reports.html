<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d8a657">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Notes RAG">
  <link rel="apple-touch-icon" href="/ui/icon.png">
  <link rel="icon" type="image/svg+xml" href="/ui/icon-maskable.svg">
  <link rel="stylesheet" href="/ui/theme.css">
  <title>Reports — workspace</title>
  <style>
    :root {
      --bg:        #1d2021;
      --surface:   #2a2c2d;
      --surface2:  #32363a;
      --border:    #3c4043;
      --text:      #d4be98;
      --text-muted:#a89984;
      --accent:    #7daea3;
      --green:     #a9b665;
      --yellow:    #d8a657;
      --red:       #ea6962;
      --purple:    #d3869b;
      --tag-bg:    #32363a;
      --radius:    8px;
    }

    .gv-content { flex: 1; overflow-y: auto; }

    main { max-width: 800px; margin: 0 auto; padding: 28px 24px 48px; }

    .page-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .page-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }

    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
    }

    .pending-section { margin-bottom: 28px; }
    .pending-section .section-label { color: var(--yellow); }

    .report-list { display: flex; flex-direction: column; gap: 8px; }

    .report-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.15s, background 0.15s;
    }
    .report-card:hover { border-color: var(--accent); background: var(--surface2); }

    .report-type-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .report-type-dot.research  { background: var(--accent); }
    .report-type-dot.forecast  { background: var(--purple); }
    .report-type-dot.report    { background: var(--green); }
    .report-type-dot.recepie, .report-type-dot.recipe { background: var(--orange, #e78a4e); }
    .report-type-dot.queued    { background: var(--yellow); animation: pulse 1.4s ease-in-out infinite; }
    .report-type-dot.note      { background: var(--gray-1, #928374); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .report-body { flex: 1; min-width: 0; }
    .report-title {
      font-size: 13px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .report-meta {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap; font-size: 11px; color: var(--text-muted);
    }
    .report-badge {
      font-size: 10px; padding: 1px 7px; border-radius: 999px; font-weight: 600;
      border: 1px solid;
    }
    .report-badge.research  { color: var(--accent);  border-color: var(--accent);  background: rgba(125,174,163,0.1); }
    .report-badge.forecast  { color: var(--purple);  border-color: var(--purple);  background: rgba(211,134,155,0.1); }
    .report-badge.report    { color: var(--green);   border-color: var(--green);   background: rgba(169,182,101,0.1); }
    .report-badge.queued    { color: var(--yellow);  border-color: var(--yellow);  background: rgba(216,166,87,0.1); }
    .report-badge.recepie, .report-badge.recipe { color: var(--orange,#e78a4e); border-color: var(--orange,#e78a4e); background: rgba(231,138,78,0.1); }
    .report-badge.note      { color: var(--text-muted); border-color: var(--border); background: transparent; }

    .report-tag {
      font-size: 10px; padding: 1px 6px; border-radius: 999px;
      background: var(--tag-bg); border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .report-filename {
      font-family: var(--mono); font-size: 10px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
    }

    .empty { padding: 48px 0; text-align: center; color: var(--text-muted); }
    .empty h2 { font-size: 15px; color: var(--text); margin-bottom: 6px; }

    .report-card { cursor: pointer; }

    /* ── Report modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 200;
      align-items: flex-start; justify-content: center;
      padding: 48px 16px 24px; overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); width: 100%; max-width: 760px;
      padding: 28px 28px 32px; position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-muted); font-size: 13px; padding: 3px 9px;
      cursor: pointer; font-family: var(--mono);
      transition: border-color 0.15s, color 0.15s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--text); }
    .modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 20px; padding-right: 48px; }
    .modal-loading { color: var(--text-muted); font-size: 13px; padding: 24px 0; }
    .md-body { font-size: 13px; line-height: 1.75; color: var(--text); }
    .md-body h1,.md-body h2,.md-body h3,.md-body h4 { color: var(--text); font-weight: 600; margin: 1.3em 0 0.4em; letter-spacing: -0.3px; }
    .md-body h1 { font-size: 17px; } .md-body h2 { font-size: 14px; } .md-body h3 { font-size: 13px; }
    .md-body p { margin: 0.5em 0; color: var(--text-muted); }
    .md-body ul,.md-body ol { padding-left: 1.4em; margin: 0.5em 0; color: var(--text-muted); }
    .md-body li { margin: 0.25em 0; }
    .md-body code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 11px; padding: 1px 5px; }
    .md-body pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; overflow-x: auto; margin: 0.7em 0; }
    .md-body pre code { background: none; border: none; padding: 0; font-size: 12px; }
    .md-body blockquote { border-left: 3px solid var(--border); margin: 0.7em 0; padding: 4px 12px; color: var(--text-muted); }
    .md-body a { color: var(--accent); }
    .md-body a:hover { text-decoration: underline; }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }
    .md-body table { border-collapse: collapse; width: 100%; font-size: 12px; margin: 0.7em 0; }
    .md-body th,.md-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .md-body th { background: var(--surface2); color: var(--text); font-weight: 600; }
    .md-body td { color: var(--text-muted); }

.filter-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text-muted); font-size: 12px;
      padding: 4px 12px; cursor: pointer; font-family: var(--mono);
      transition: border-color 0.15s, color 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); }

    .loading { padding: 48px 0; text-align: center; color: var(--text-muted); }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .pagination {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 16px; align-items: center;
    }
    .page-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-muted); font-size: 11px;
      padding: 4px 10px; cursor: pointer; font-family: var(--mono);
      transition: border-color 0.15s, color 0.15s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(125,174,163,0.1); }
    .page-ellipsis { color: var(--text-muted); font-size: 11px; padding: 4px 2px; }
  </style>
</head>
<body>

<div class="gv-top-bar">
  <div class="gv-logo-area">
    <a href="/" class="gv-home-link"><div class="gv-logo-mark">w</div><span class="gv-breadcrumb-root">workspace</span></a>
    <span class="gv-breadcrumb-sep">/</span>
    <span class="gv-breadcrumb-page">reports</span>
  </div>
    <nav class="gv-nav">
    <a class="gv-nav-pill" href="/new">new</a>
    <a class="gv-nav-pill" href="/notes">search</a>
    <a class="gv-nav-pill" href="/chat">chat</a>
    <a class="gv-nav-pill active" href="/reports">reports</a>
    <a class="gv-nav-pill" href="/review">review</a>
    <a class="gv-nav-pill" href="/kanban">kanban</a>
    <a class="gv-nav-pill" href="/projects">projects</a>
  </nav>
  <div class="gv-top-right">
    <div class="gv-active-dot"></div>
  </div>
</div>

<div class="gv-content">
  <main>
    <div class="page-header">
      <span class="page-title">Reports</span>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      Loading reports…
    </div>

    <div id="filter-row" class="filter-row" style="display:none"></div>

    <div id="pending-section" class="pending-section" style="display:none">
      <div class="section-label">Queued</div>
      <div class="report-list" id="pending-list"></div>
    </div>

    <div id="completed-section" style="display:none">
      <div class="section-label" id="inbox-label">Inbox</div>
      <div class="report-list" id="completed-list"></div>
      <div id="pagination"></div>
    </div>

    <div id="empty" class="empty" style="display:none">
      <h2>Inbox is empty</h2>
      <p>Research and forecast reports appear here when completed.</p>
    </div>

  </main>
</div>

<!-- Report viewer modal -->
<div class="modal-overlay" id="report-modal" onclick="handleModalClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"><div class="modal-loading">Loading…</div></div>
  </div>
</div>

<div class="gv-bottom-bar">
  <span style="color:var(--green-dim,rgba(169,182,101,0.6))">●</span>
  <span>reports</span>
  <span class="sep">│</span>
  <span id="count-label">—</span>
</div>

<script>
const PAGE_SIZE = 10;
let _allResults = [];
let _activeFilter = 'all';
let _filteredResults = [];
let _currentPage = 1;

async function load() {
  try {
    const res = await fetch('/api/reports/list');
    const data = await res.json();
    _allResults = data.results || [];
    const pending = data.pending || [];
    buildFilters(_allResults);
    renderPending(pending);
    applyFilter();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<span style="color:var(--red)">Failed to load: ' + esc(e.message) + '</span>';
  }
}

function buildFilters(results) {
  const counts = {};
  for (const r of results) {
    const key = (r.category || '').toLowerCase().replace(/[^a-z]/g, '') || 'note';
    const label = r.category || 'note';
    if (!counts[key]) counts[key] = { label, n: 0 };
    counts[key].n++;
  }

  const filterRow = document.getElementById('filter-row');
  let html = `<button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">all (${results.length})</button>`;
  const sorted = Object.entries(counts).sort((a, b) => b[1].n - a[1].n);
  for (const [key, { label, n }] of sorted) {
    html += `<button class="filter-btn" data-filter="${key}" onclick="setFilter('${key}',this)">${esc(label)} (${n})</button>`;
  }
  filterRow.innerHTML = html;
  filterRow.style.display = results.length ? '' : 'none';
}

function setFilter(filter, btn) {
  _activeFilter = filter;
  document.querySelectorAll('#filter-row .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.getElementById('loading').style.display = 'none';
  _filteredResults = _activeFilter === 'all'
    ? _allResults
    : _allResults.filter(r => {
        const key = (r.category || '').toLowerCase().replace(/[^a-z]/g, '') || 'note';
        return key === _activeFilter;
      });
  _currentPage = 1;
  renderPage();
}

function setPage(n) {
  _currentPage = n;
  renderPage();
  document.getElementById('completed-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderPage() {
  const section = document.getElementById('completed-section');
  const label = document.getElementById('inbox-label');
  const empty = document.getElementById('empty');

  if (_filteredResults.length) {
    section.style.display = '';
    label.textContent = _activeFilter === 'all' ? 'Inbox' : _activeFilter;

    const start = (_currentPage - 1) * PAGE_SIZE;
    const pageItems = _filteredResults.slice(start, start + PAGE_SIZE);
    document.getElementById('completed-list').innerHTML =
      pageItems.map(r => cardHtml(r, r.category, r.tags || [])).join('');

    const totalPages = Math.ceil(_filteredResults.length / PAGE_SIZE);
    document.getElementById('pagination').innerHTML = buildPagination(totalPages);
    empty.style.display = 'none';
  } else {
    section.style.display = 'none';
    document.getElementById('pagination').innerHTML = '';
    empty.style.display = _allResults.length ? '' : 'none';
  }

  const end = Math.min(_currentPage * PAGE_SIZE, _filteredResults.length);
  const start = (_currentPage - 1) * PAGE_SIZE + 1;
  const pageInfo = _filteredResults.length > PAGE_SIZE
    ? ` · ${start}–${end} of ${_filteredResults.length}`
    : '';
  document.getElementById('count-label').textContent =
    _filteredResults.length !== _allResults.length
      ? `${_filteredResults.length} of ${_allResults.length}${pageInfo}`
      : `${_allResults.length} item${_allResults.length !== 1 ? 's' : ''}${pageInfo}`;
}

function buildPagination(totalPages) {
  if (totalPages <= 1) return '';
  let html = '<div class="pagination">';
  if (_currentPage > 1)
    html += `<button class="page-btn" onclick="setPage(${_currentPage - 1})">← prev</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - _currentPage) <= 1) {
      html += `<button class="page-btn${i === _currentPage ? ' active' : ''}" onclick="setPage(${i})">${i}</button>`;
    } else if (Math.abs(i - _currentPage) === 2) {
      html += `<span class="page-ellipsis">…</span>`;
    }
  }
  if (_currentPage < totalPages)
    html += `<button class="page-btn" onclick="setPage(${_currentPage + 1})">next →</button>`;
  html += '</div>';
  return html;
}

function renderPending(pending) {
  if (!pending.length) return;
  document.getElementById('pending-section').style.display = '';
  document.getElementById('pending-list').innerHTML =
    pending.map(r => cardHtml(r, 'queued', [])).join('');
}

function cardHtml(r, type, tags) {
  const cls = (type || '').toLowerCase().replace(/[^a-z]/g, '') || 'note';
  const date = r.date ? `<span>${esc(r.date)}</span>` : '';
  const tagPills = (tags || []).slice(0, 4).map(t =>
    `<span class="report-tag">${esc(t)}</span>`).join('');
  const filenameAttr = esc(r.filename).replace(/'/g, "\\'");
  const titleAttr = esc(r.title || r.filename).replace(/'/g, "\\'");
  return `<div class="report-card" onclick="openReport('${filenameAttr}','${titleAttr}')">
    <div class="report-type-dot ${cls}"></div>
    <div class="report-body">
      <div class="report-title">${esc(r.title || r.filename)}</div>
      <div class="report-meta">
        <span class="report-badge ${cls}">${esc(r.category || cls)}</span>
        ${date}
        ${tagPills}
        <span class="report-filename">${esc(r.filename)}</span>
      </div>
    </div>
  </div>`;
}

async function openReport(filename, title) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = '<div class="modal-loading">Loading…</div>';
  document.getElementById('report-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  try {
    const res = await fetch('/api/notes/' + encodeURIComponent(filename));
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    const html = typeof marked !== 'undefined'
      ? marked.parse(data.body)
      : '<pre style="white-space:pre-wrap;color:var(--text-muted)">' + esc(data.body) + '</pre>';
    document.getElementById('modal-body').innerHTML = '<div class="md-body">' + html + '</div>';
  } catch (e) {
    document.getElementById('modal-body').innerHTML =
      '<div style="color:var(--red)">Failed to load: ' + esc(e.message) + '</div>';
  }
}

function closeModal() {
  document.getElementById('report-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function handleModalClick(e) {
  if (e.target === document.getElementById('report-modal')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
