<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kanban">
  <link rel="apple-touch-icon" href="/ui/icon.png">
  <title>Todos — Kanban</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #1c2128;
      --border:      #30363d;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --text-dim:    #484f58;
      --accent:      #58a6ff;
      --accent-dim:  #0d2044;
      --accent-border:var(--accent-border);
      --green:       #3fb950;
      --green-light: #56d364;
      --green-dim:   #033a27;
      --green-deep:  var(--green-deep);
      --red:         #f85149;
      --yellow:      #d29922;
      --yellow-light:#e3b341;
      --purple:      #a371f7;
      --purple-light:#c9a8ff;
      --purple-dim:  #231f5e;
      --purple-deep: #160f2b;
      --radius:      8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

    .home-btn { font-size: 13px; color: var(--text-muted); text-decoration: none; background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; display: inline-flex; align-items: center; gap: 5px; }
    .home-btn:hover { color: var(--text); border-color: var(--accent); }
    header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .meta { font-size: 12px; color: var(--text-dim); }
    .project-filter { font-size: 13px; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); padding: 5px 10px; border-radius: 6px; outline: none; cursor: pointer; max-width: 160px; }
    .project-filter:focus { border-color: var(--accent); }
    .project-filter.active { border-color: var(--accent); color: var(--accent); }
    .refresh-btn { font-size: 13px; color: var(--accent); cursor: pointer; background: none; border: 1px solid var(--accent-border); padding: 5px 12px; border-radius: 6px; }
    .refresh-btn:hover { background: var(--accent-border); }
    .new-btn { font-size: 13px; color: var(--purple-light); cursor: pointer; background: none; border: 1px solid var(--purple-dim); padding: 5px 12px; border-radius: 6px; }
    .new-btn:hover { background: var(--purple-deep); }
    .enrich-btn { font-size: 13px; color: var(--green-light); cursor: pointer; background: none; border: 1px solid var(--green-dim); padding: 5px 12px; border-radius: 6px; transition: background 0.15s; }
    .enrich-btn:hover { background: var(--green-deep); }
    .enrich-btn:disabled { opacity: 0.4; cursor: default; }

    .board { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; overflow-x: auto; }

    /* ── Swimlane ── */
    .swimlane { min-width: 480px; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); flex: 0 0 auto; }

    .sl-header { padding: 11px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; border-bottom: 1px solid var(--border); user-select: none; }
    .sl-header:hover .sl-name { color: var(--text-muted); }
    .swimlane.collapsed .sl-header { border-bottom-color: transparent; }

    .sl-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .sl-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); flex: 1; }
    .sl-count { background: var(--border); color: var(--text-muted); font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 10px; }
    .sl-toggle { font-size: 14px; color: var(--text-dim); line-height: 1; transition: transform 0.25s ease; display: inline-block; }
    .swimlane.collapsed .sl-toggle { transform: rotate(-90deg); }

    .sl-body { display: flex; gap: 14px; padding: 10px 12px 12px; align-items: flex-start; }
    .swimlane.collapsed .sl-body { display: none; }

    /* ── Status columns inside each lane ── */
    .sl-col { flex: 1; min-width: 80px; display: flex; flex-direction: column; border-radius: 7px; transition: flex 0.25s ease, background 0.1s; }
    .sl-col.drag-over { background: var(--accent-border); outline: 1px solid var(--accent); }

    .sl-col-label { display: flex; align-items: center; gap: 6px; padding: 4px 4px 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); cursor: pointer; user-select: none; }
    .sl-col-chevron { font-size: 12px; color: var(--text-dim); line-height: 1; transition: transform 0.2s ease; display: inline-block; margin-left: 2px; }

    #board.hide-pending     .sl-col[data-status="pending"],
    #board.hide-in_progress .sl-col[data-status="in_progress"],
    #board.hide-completed   .sl-col[data-status="completed"],
    #board.hide-wontdo      .sl-col[data-status="wontdo"] { flex: 0 0 28px; min-width: 28px; overflow: hidden; background: var(--surface2); border-radius: 6px; align-self: stretch; }

    #board.hide-pending     .sl-col[data-status="pending"]     .cards,
    #board.hide-in_progress .sl-col[data-status="in_progress"] .cards,
    #board.hide-completed   .sl-col[data-status="completed"]   .cards,
    #board.hide-wontdo      .sl-col[data-status="wontdo"]      .cards { display: none; }

    #board.hide-pending     .sl-col[data-status="pending"]     .sl-col-label,
    #board.hide-in_progress .sl-col[data-status="in_progress"] .sl-col-label,
    #board.hide-completed   .sl-col[data-status="completed"]   .sl-col-label,
    #board.hide-wontdo      .sl-col[data-status="wontdo"]      .sl-col-label { writing-mode: vertical-rl; transform: rotate(180deg); padding: 10px 0; flex: 1; justify-content: flex-end; gap: 4px; }

    #board.hide-pending     .sl-col[data-status="pending"]     .sl-col-count,
    #board.hide-in_progress .sl-col[data-status="in_progress"] .sl-col-count,
    #board.hide-completed   .sl-col[data-status="completed"]   .sl-col-count,
    #board.hide-wontdo      .sl-col[data-status="wontdo"]      .sl-col-count,
    #board.hide-pending     .sl-col[data-status="pending"]     .sl-col-chevron,
    #board.hide-in_progress .sl-col[data-status="in_progress"] .sl-col-chevron,
    #board.hide-completed   .sl-col[data-status="completed"]   .sl-col-chevron,
    #board.hide-wontdo      .sl-col[data-status="wontdo"]      .sl-col-chevron { display: none; }
    .sl-col-count { background: var(--border); color: var(--text-muted); font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-left: auto; }

    .col-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .col-dot.pending     { background: var(--accent); }
    .col-dot.in_progress { background: var(--yellow-light); }
    .col-dot.completed   { background: var(--green); }
    .col-dot.wontdo      { background: var(--text-dim); }


    .project-tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; border: 1px solid; letter-spacing: 0.02em; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cards { padding: 0 2px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 7px; min-height: 32px; align-content: start; }

    /* ── Cards ── */
    .card { background: var(--bg); border-radius: 7px; border: 1px solid var(--border); border-left: none; padding: 10px 11px 10px 14px; cursor: grab; transition: box-shadow 0.12s, border-color 0.12s; user-select: none; position: relative; overflow: hidden; }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.4); border-color: var(--text-dim); }
    .card.dragging { opacity: 0.45; cursor: grabbing; }

    /* Left stripe: top 60% = priority colour, bottom 40% = complexity shade (or solid if no complexity) */
    .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .card.priority-high::before   { background: #f85149; }
    .card.priority-medium::before { background: #d29922; }
    .card.priority-low::before    { background: #484f58; }
    .card.priority-high.cx-small::before    { background: linear-gradient(to bottom, #f85149 60%, #fca5a5 60%); }
    .card.priority-high.cx-medium::before   { background: linear-gradient(to bottom, #f85149 60%, #be123c 60%); }
    .card.priority-high.cx-large::before    { background: linear-gradient(to bottom, #f85149 60%, #7f1d1d 60%); }
    .card.priority-medium.cx-small::before  { background: linear-gradient(to bottom, #d29922 60%, #fde68a 60%); }
    .card.priority-medium.cx-medium::before { background: linear-gradient(to bottom, #d29922 60%, #b45309 60%); }
    .card.priority-medium.cx-large::before  { background: linear-gradient(to bottom, #d29922 60%, #78350f 60%); }
    .card.priority-low.cx-small::before     { background: linear-gradient(to bottom, #484f58 60%, #94a3b8 60%); }
    .card.priority-low.cx-medium::before    { background: linear-gradient(to bottom, #484f58 60%, #334155 60%); }
    .card.priority-low.cx-large::before     { background: linear-gradient(to bottom, #484f58 60%, #1e293b 60%); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--text); }
    .card-id { font-size: 11px; color: var(--text-dim); font-weight: 600; flex-shrink: 0; margin-top: 1px; }

    .card-footer { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .card-prereqs { font-size: 11px; color: var(--text-dim); }
    .complexity-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; min-height: 14px; }

    .empty { color: var(--border); font-size: 12px; text-align: center; padding: 16px 0; }

    /* ── Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; max-width: 560px; width: 92%; max-height: 82vh; overflow-y: auto; box-shadow: 0 25px 80px rgba(0,0,0,0.6); }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
    .modal-title { font-size: 15px; font-weight: 600; line-height: 1.4; color: var(--text); }
    .modal-close { cursor: pointer; color: var(--text-dim); font-size: 22px; line-height: 1; flex-shrink: 0; }
    .modal-close:hover { color: var(--text-muted); }
    .modal-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    .modal-meta span { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 2px 8px; border-radius: 4px; }
    .modal-section { margin-top: 14px; }
    .modal-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 6px; }
    .modal-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .modal-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .modal-body { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
    .modal-body h1, .modal-body h2, .modal-body h3 { color: #cbd5e1; font-size: 13px; font-weight: 700; margin: 12px 0 4px; }
    .modal-body p { margin-bottom: 8px; }
    .modal-body ul, .modal-body ol { padding-left: 18px; margin-bottom: 8px; }
    .modal-body li { margin-bottom: 3px; }
    .modal-body code { background: var(--bg); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; color: #7dd3fc; }
    .modal-body pre { background: var(--bg); border: 1px solid var(--border); padding: 10px 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 8px; }
    .modal-body pre code { background: none; border: none; padding: 0; color: var(--text-muted); }
    .modal-body hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .modal-body a { color: var(--accent); text-decoration: none; }
    .modal-body a:hover { text-decoration: underline; }
    .modal-body strong { color: #cbd5e1; font-weight: 600; }
    .modal-body-loading { color: var(--text-dim); font-size: 12px; font-style: italic; padding-top: 14px; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--border); color: var(--text); border: 1px solid var(--text-dim); padding: 10px 16px; border-radius: 7px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 200; white-space: nowrap; }
    .toast.show { opacity: 1; }

    /* ── Create panel ── */
    .create-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 110; }
    .create-overlay.open { display: block; }
    .create-panel { position: absolute; top: 0; right: 0; bottom: 0; width: 380px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,0.5); }
    .create-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .create-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .create-close { color: var(--text-dim); font-size: 22px; cursor: pointer; line-height: 1; }
    .create-close:hover { color: var(--text-muted); }
    .create-form { padding: 20px; display: flex; flex-direction: column; gap: 16px; flex: 1; overflow-y: auto; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .form-required { color: #f87171; }
    .form-optional { color: var(--text-dim); font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 11px; }
    .form-input, .form-select, .form-textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 8px 10px; border-radius: 6px; outline: none; font-family: inherit; width: 100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--purple); }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-select option { background: var(--surface); }
    .form-hint { font-size: 11px; color: var(--text-dim); font-style: italic; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; }
    .form-cancel { background: none; border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .form-cancel:hover { border-color: var(--text-dim); color: var(--text-muted); }
    .form-submit { background: #6d28d9; border: 1px solid #7c3aed; color: var(--text); font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .form-submit:hover { background: #7c3aed; }
    .form-submit:disabled { opacity: 0.5; cursor: default; }

    /* ── Terminal ── */
    .term-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 150; background: var(--accent-border); border: 1px solid var(--accent); color: var(--accent); font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
    .term-toggle:hover { background: #1e4a7f; }
    .term-toggle .term-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

    .term-panel { position: fixed; bottom: 0; left: 0; right: 0; height: 360px; background: #0d1117; border-top: 1px solid var(--border); z-index: 140; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.25s ease; }
    .term-panel.open { transform: translateY(0); }

    .term-header { padding: 9px 16px; background: #161b22; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .term-header-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .term-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
    .term-close { color: var(--text-dim); font-size: 18px; cursor: pointer; line-height: 1; }
    .term-close:hover { color: var(--text-muted); }

    .term-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .term-msg { display: flex; flex-direction: column; gap: 2px; max-width: 85%; }
    .term-msg.user { align-self: flex-end; align-items: flex-end; }
    .term-msg.agent { align-self: flex-start; }
    .term-msg-label { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .term-msg-bubble { font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; line-height: 1.5; padding: 7px 11px; border-radius: 7px; white-space: pre-wrap; word-break: break-word; }
    .term-msg.user .term-msg-bubble { background: var(--accent-border); color: #93c5fd; border: 1px solid #1e4a8f; }
    .term-msg.agent .term-msg-bubble { background: #161b22; color: var(--text-muted); border: 1px solid var(--border); }
    .term-msg.agent.thinking .term-msg-bubble { color: var(--text-dim); font-style: italic; }

    .term-input-row { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; background: #0d1117; }
    .term-input { flex: 1; background: #161b22; border: 1px solid var(--border); color: var(--text); font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; padding: 7px 11px; border-radius: 6px; outline: none; }
    .term-input:focus { border-color: var(--accent); }
    .term-input::placeholder { color: var(--border); }
    .term-send { background: var(--accent-border); border: 1px solid var(--accent); color: var(--accent); font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 6px; cursor: pointer; }
    .term-send:hover { background: #1e4a7f; }
    .term-send:disabled { opacity: 0.4; cursor: default; }

    /* ── Settings panel ── */
    .settings-btn { font-size: 13px; color: var(--text-muted); cursor: pointer; background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; }
    .settings-btn:hover { background: var(--surface); }
    .settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 110; }
    .settings-overlay.open { display: block; }
    .settings-panel { position: absolute; top: 0; right: 0; bottom: 0; width: 380px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,0.5); }
    .settings-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .settings-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .settings-close { color: var(--text-dim); font-size: 22px; cursor: pointer; line-height: 1; }
    .settings-close:hover { color: var(--text-muted); }
    .settings-body { padding: 20px; display: flex; flex-direction: column; gap: 24px; flex: 1; overflow-y: auto; }
    .settings-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 10px; }
    .swimlane-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .swimlane-chip { display: flex; align-items: center; gap: 5px; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; padding: 4px 10px; border-radius: 14px; }
    .swimlane-chip-del { color: var(--text-dim); cursor: pointer; font-size: 15px; line-height: 1; margin-left: 2px; }
    .swimlane-chip-del:hover { color: #f87171; }
    .swimlane-add-row { display: flex; gap: 8px; }
    .swimlane-add-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 7px 10px; border-radius: 6px; outline: none; font-family: inherit; }
    .swimlane-add-input:focus { border-color: var(--purple); }
    .swimlane-add-btn { background: var(--accent-border); border: 1px solid var(--accent); color: var(--accent); font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .swimlane-add-btn:hover { background: #1e4a7f; }
    .cron-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .cron-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .cron-select { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 7px 10px; border-radius: 6px; outline: none; font-family: inherit; }
    .cron-select:focus { border-color: var(--purple); }
    .cron-preview { font-size: 11px; color: var(--text-dim); font-family: 'SF Mono', 'Fira Code', monospace; margin-bottom: 12px; }
    .cron-actions { display: flex; gap: 8px; }
    .cron-save-btn { background: #6d28d9; border: 1px solid #7c3aed; color: var(--text); font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .cron-save-btn:hover { background: #7c3aed; }
    .cron-save-btn:disabled { opacity: 0.5; cursor: default; }
    .cron-run-btn { background: none; border: 1px solid var(--green-dim); color: var(--green-light); font-size: 13px; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; }
    .cron-run-btn:hover { background: var(--green-deep); }
    .settings-divider { border: none; border-top: 1px solid var(--border); margin: 0; }
    .modal-edit-btn { cursor: pointer; font-size: 12px; color: var(--accent); background: none; border: 1px solid var(--accent-border); padding: 4px 10px; border-radius: 5px; }
    .modal-edit-btn:hover { background: var(--accent-border); }
    .modal-header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .edit-form { display: none; }
    .edit-form.active { display: block; }
    .edit-form-group { margin-bottom: 12px; }
    .edit-form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 5px; }
    .edit-form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: inherit; }
    .edit-form-input:focus { outline: none; border-color: var(--accent); }
    .edit-form-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; min-height: 180px; resize: vertical; line-height: 1.6; }
    .edit-form-textarea:focus { outline: none; border-color: var(--accent); }
    .edit-form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
    .edit-save-btn { background: #2563eb; color: #fff; border: none; padding: 7px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .edit-save-btn:hover { background: #1d4ed8; }
    .edit-save-btn:disabled { opacity: 0.5; cursor: default; }
    .edit-cancel-btn { background: none; color: var(--text-muted); border: 1px solid var(--border); padding: 7px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .edit-cancel-btn:hover { color: var(--text-muted); }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <a class="home-btn" href="/">← Workspace</a>
    <h1>Kanban</h1>
  </div>
  <div class="header-right">
    <span class="meta" id="last-updated"></span>
    <select class="project-filter" id="project-filter" onchange="setProjectFilter(this.value)">
      <option value="">All projects</option>
    </select>
    <button class="settings-btn" onclick="openSettingsPanel()">&#9881; Settings</button>
    <button class="new-btn" onclick="openCreatePanel()">➕ New</button>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
  </div>
</header>

<div class="board" id="board"></div>

<!-- Card detail modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <div class="modal-header-actions">
        <button class="modal-edit-btn" id="modal-edit-btn" onclick="startEdit()">Edit</button>
        <span class="modal-close" onclick="closeModal()">×</span>
      </div>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div id="modal-extra"></div>
    <div id="modal-prereq-actions" style="margin-top:10px"></div>
    <div id="modal-body-wrap"></div>
    <div id="modal-edit-form" class="edit-form">
      <hr class="modal-divider" style="margin-top:14px">
      <div class="edit-form-group">
        <label class="edit-form-label">Title</label>
        <input class="edit-form-input" id="edit-title" type="text" />
      </div>
      <div class="edit-form-group">
        <label class="edit-form-label">Body (markdown)</label>
        <textarea class="edit-form-textarea" id="edit-body"></textarea>
      </div>
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group">
          <label class="edit-form-label">Status</label>
          <select class="form-select" id="edit-status">
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="wontdo">Won't Do</option>
          </select>
        </div>
        <div class="form-group">
          <label class="edit-form-label">Priority</label>
          <select class="form-select" id="edit-priority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group">
          <label class="edit-form-label">Swimlane</label>
          <select class="form-select" id="edit-swimlane">
            <option value="">— none —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="edit-form-label">Assignee</label>
          <select class="form-select" id="edit-assignee">
            <option value="">— unassigned —</option>
            <option value="claude-code">claude-code</option>
            <option value="hermes">hermes</option>
            <option value="openclaw">openclaw</option>
            <option value="angelo">angelo</option>
          </select>
        </div>
      </div>
      <div class="edit-form-group">
        <label class="edit-form-label">Project</label>
        <select class="form-select" id="edit-project" style="width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;font-size:13px;padding:7px 10px;border-radius:6px;font-family:inherit;">
          <option value="">— no project —</option>
        </select>
      </div>
      <div class="edit-form-group">
        <label class="edit-form-label">Complexity</label>
        <select class="form-select" id="edit-complexity" onchange="updateComplexityHint('edit')" style="width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;font-size:13px;padding:7px 10px;border-radius:6px;font-family:inherit;">
          <option value="">— not set —</option>
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
        <p class="complexity-hint" id="edit-complexity-hint"></p>
      </div>
      <div class="edit-form-actions">
        <button class="edit-cancel-btn" onclick="cancelEdit()">Cancel</button>
        <button class="edit-save-btn" id="edit-save-btn" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Create todo slide-in panel -->
<div class="create-overlay" id="create-overlay" onclick="closeCreateOverlay(event)">
  <div class="create-panel">
    <div class="create-header">
      <span class="create-title">New Todo</span>
      <span class="create-close" onclick="closeCreatePanel()">×</span>
    </div>
    <form class="create-form" id="create-form" onsubmit="submitCreate(event)">
      <div class="form-group">
        <label class="form-label">Title <span class="form-required">*</span></label>
        <input class="form-input" id="cf-title" type="text" placeholder="What needs doing?" required autocomplete="off" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="cf-priority">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Swimlane</label>
          <select class="form-select" id="cf-swimlane"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Assignee <span class="form-optional">(optional)</span></label>
          <select class="form-select" id="cf-assignee">
            <option value="">— unassigned —</option>
            <option value="claude-code">claude-code</option>
            <option value="hermes">hermes</option>
            <option value="openclaw">openclaw</option>
            <option value="user">user</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Project <span class="form-optional">(optional)</span></label>
          <select class="form-select" id="cf-project">
            <option value="">— no project —</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Complexity <span class="form-optional">(optional)</span></label>
        <select class="form-select" id="cf-complexity" onchange="updateComplexityHint('cf')">
          <option value="">— not set —</option>
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
        <p class="complexity-hint" id="cf-complexity-hint"></p>
      </div>
      <div class="form-group">
        <label class="form-label">Description <span class="form-optional">(optional)</span></label>
        <textarea class="form-textarea" id="cf-desc" placeholder="Any details..." rows="4"></textarea>
      </div>
      <p class="form-hint">Todo will be created as Pending.</p>
      <div class="form-actions">
        <button type="button" class="form-cancel" onclick="closeCreatePanel()">Cancel</button>
        <button type="submit" class="form-submit" id="cf-submit">Create Todo</button>
      </div>
    </form>
  </div>
</div>

<!-- Settings slide-in panel -->
<div class="settings-overlay" id="settings-overlay" onclick="closeSettingsOverlay(event)">
  <div class="settings-panel">
    <div class="settings-header">
      <span class="settings-title">&#9881; Settings</span>
      <span class="settings-close" onclick="closeSettingsPanel()">&#215;</span>
    </div>
    <div class="settings-body">
      <div>
        <div class="settings-section-title">Swimlanes</div>
        <div class="swimlane-chips" id="settings-swimlane-chips"></div>
        <div class="swimlane-add-row">
          <input class="swimlane-add-input" id="settings-lane-input" type="text" placeholder="New swimlane name..." autocomplete="off" onkeydown="if(event.key==='Enter')addSwimlane()" maxlength="32" />
          <button class="swimlane-add-btn" onclick="addSwimlane()">Add</button>
        </div>
      </div>
      <hr class="settings-divider" />
      <div>
        <div class="settings-section-title">Enrich Schedule</div>
        <div class="cron-row">
          <span class="cron-label">Run at</span>
          <select class="cron-select" id="cron-hour" onchange="updateCronPreview()"></select>
          <span class="cron-label">:</span>
          <select class="cron-select" id="cron-minute" onchange="updateCronPreview()"></select>
          <span class="cron-label">daily (AEDT)</span>
        </div>
        <div class="cron-preview" id="cron-preview"></div>
        <div class="cron-actions">
          <button class="cron-save-btn" id="cron-save-btn" onclick="saveCronSchedule()">Save Schedule</button>
          <button class="cron-run-btn" onclick="runEnrichNow()">Run Now</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let todos = [];
  let swimlanes = [];
  let projects = [];
  let draggingId = null;
  let filterProject = localStorage.getItem('kanban-filter-project') || '';

  function setProjectFilter(slug) {
    filterProject = slug;
    localStorage.setItem('kanban-filter-project', slug);
    const sel = document.getElementById('project-filter');
    if (sel) sel.classList.toggle('active', !!slug);
    render();
  }

  async function loadProjects() {
    try {
      const res = await fetch('/api/projects');
      const data = await res.json();
      projects = data.projects || [];
      const opts = projects.map(p => `<option value="${esc(p.slug)}">${esc(p.title)}</option>`).join('');
      const blank = '<option value="">— no project —</option>';
      ['cf-project', 'edit-project'].forEach(id => {
        const sel = document.getElementById(id);
        if (sel) sel.innerHTML = blank + opts;
      });
    } catch { /* leave blank */ }
  }

  function updateFilterDropdown() {
    const sel = document.getElementById('project-filter');
    if (!sel) return;
    const used = new Set(todos.map(t => t.project).filter(Boolean));
    const opts = projects
      .filter(p => used.has(p.slug))
      .map(p => `<option value="${esc(p.slug)}">${esc(p.title)}</option>`)
      .join('');
    sel.innerHTML = '<option value="">All projects</option>' + opts;
    sel.value = filterProject;
    sel.classList.toggle('active', !!filterProject);
  }

  const LANE_COLORS = ['#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899','#06b6d4','#f97316','#84cc16'];

  const STATUSES = [
    { id: 'pending',     label: 'Pending',     dot: 'pending'     },
    { id: 'in_progress', label: 'In Progress', dot: 'in_progress' },
    { id: 'completed',   label: 'Completed',   dot: 'completed'   },
    { id: 'wontdo',      label: "Won't Do",    dot: 'wontdo'      },
  ];


  const _PROJECT_COLORS = ['#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899','#06b6d4','#f97316','#84cc16'];
  function projectColor(slug) {
    if (!slug) return '#475569';
    let h = 0;
    for (let i = 0; i < slug.length; i++) h = ((h << 5) - h) + slug.charCodeAt(i);
    return _PROJECT_COLORS[Math.abs(h) % _PROJECT_COLORS.length];
  }

  function laneId(name) {
    return name.toLowerCase().replace(/[^a-z0-9]/g, '-');
  }

  function toggleSwimlane(id) {
    const el = document.getElementById('sl-' + id);
    if (!el) return;
    const isCollapsed = el.classList.toggle('collapsed');
    localStorage.setItem('kanban-sl-' + id, isCollapsed);
  }

  function toggleStatus(statusId) {
    const board = document.getElementById('board');
    const isHidden = board.classList.toggle('hide-' + statusId);
    localStorage.setItem('kanban-hide-' + statusId, isHidden);
  }

  function initStatusCollapse() {
    const board = document.getElementById('board');
    STATUSES.forEach(s => {
      if (localStorage.getItem('kanban-hide-' + s.id) === 'true') {
        board.classList.add('hide-' + s.id);
      }
    });
  }

  async function load() {
    try {
      const [todosRes, lanesRes] = await Promise.all([fetch('/api/kanban/todos'), fetch('/api/kanban/swimlanes')]);
      todos = await todosRes.json();
      swimlanes = await lanesRes.json();
      updateFilterDropdown();
      render();
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
      showToast('Failed to load');
    }
  }

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    const visibleTodos = filterProject ? todos.filter(t => t.project === filterProject) : todos;

    const lanesToShow = [...swimlanes];
    const hasUncategorized = visibleTodos.some(t => !t.swimlane || !swimlanes.includes(t.swimlane));
    if (hasUncategorized) lanesToShow.push('__uncategorized__');

    lanesToShow.forEach((lane, idx) => {
      const isUncategorized = lane === '__uncategorized__';
      const id = isUncategorized ? 'uncategorized' : laneId(lane);
      const displayName = isUncategorized ? 'Uncategorized' : lane;
      const color = isUncategorized ? '#475569' : LANE_COLORS[idx % LANE_COLORS.length];
      const laneValue = isUncategorized ? '' : lane;

      const laneTodos = isUncategorized
        ? visibleTodos.filter(t => !t.swimlane || !swimlanes.includes(t.swimlane))
        : visibleTodos.filter(t => t.swimlane === lane);

      if (!laneTodos.length) return;

      const section = document.createElement('div');
      section.className = 'swimlane';
      section.id = 'sl-' + id;

      const colsHtml = STATUSES.map(s => {
        const count = laneTodos.filter(t => t.status === s.id).length;
        return `<div class="sl-col"
            data-status="${s.id}"
            data-lane="${esc(laneValue)}"
            ondragover="onDragOver(event)"
            ondragleave="onDragLeave(event)"
            ondrop="onDrop(event,'${s.id}','${esc(laneValue)}')">
          <div class="sl-col-label" data-status="${s.id}" onclick="toggleStatus('${s.id}')">
            <span class="col-dot ${s.dot}"></span>
            <span>${esc(s.label)}</span>
            <span class="sl-col-count" id="slc-${id}-${s.id}">${count}</span>
            <span class="sl-col-chevron">▾</span>
          </div>
          <div class="cards" id="cards-${id}-${s.id}"></div>
        </div>`;
      }).join('');

      section.innerHTML = `
        <div class="sl-header" onclick="toggleSwimlane('${id}')">
          <span class="sl-dot" style="background:${color}"></span>
          <span class="sl-name">${esc(displayName)}</span>
          <span class="sl-count">${laneTodos.length}</span>
          <span class="sl-toggle">▾</span>
        </div>
        <div class="sl-body">${colsHtml}</div>`;

      board.appendChild(section);

      // Populate cards
      const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
      STATUSES.forEach(s => {
        const items = laneTodos
          .filter(t => t.status === s.id)
          .sort((a, b) => (PRIORITY_ORDER[a.priority] ?? 1) - (PRIORITY_ORDER[b.priority] ?? 1));
        const el = document.getElementById('cards-' + id + '-' + s.id);
        if (!items.length) {
          el.innerHTML = '<div class="empty">No items</div>';
          return;
        }
        items.forEach(t => el.appendChild(makeCard(t)));
      });

      // Restore collapse state
      const stored = localStorage.getItem('kanban-sl-' + id);
      if (stored === 'true') section.classList.add('collapsed');
    });
  }

  function makeCard(todo) {
    const div = document.createElement('div');
    const cx = todo.complexity ? ' cx-' + todo.complexity : '';
    div.className = 'card priority-' + (todo.priority || 'medium') + cx;
    div.draggable = true;
    div.dataset.id = todo.id;

    const prereqText = todo.prereqIds && todo.prereqIds.length
      ? '<span class="card-prereqs">→ ' + todo.prereqIds.join(', ') + '</span>' : '';

    const proj = todo.project;
    const projTag = proj
      ? '<span class="project-tag" style="color:' + projectColor(proj) + ';background:' + projectColor(proj) + '22;border-color:' + projectColor(proj) + '44">' + esc(proj) + '</span>'
      : '';

    div.innerHTML =
      '<div class="card-top">' +
        '<span class="card-title">' + esc(todo.title) + '</span>' +
        '<span class="card-id">#' + pad(todo.id) + '</span>' +
      '</div>' +
      '<div class="card-footer">' +
        projTag +
        prereqText +
      '</div>';

    div.addEventListener('dragstart', () => {
      draggingId = todo.id;
      setTimeout(() => div.classList.add('dragging'), 0);
    });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('click', () => openModal(todo));
    return div;
  }

  const COMPLEXITY_HINTS = {
    small:  'Single-file fix. Claude acts immediately and commits.',
    medium: 'Multi-file change. Claude may ask 1–2 questions before starting.',
    large:  'Cross-service or new infra. Claude invokes /plan and asks clarifying questions first.',
  };
  function updateComplexityHint(prefix) {
    const val = document.getElementById(prefix + '-complexity').value;
    const el = document.getElementById(prefix + '-complexity-hint');
    if (el) el.textContent = COMPLEXITY_HINTS[val] || '';
  }

  function onDragOver(e) {
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
  }

  function onDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  async function onDrop(e, newStatus, newLane) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (draggingId == null) return;

    const todo = todos.find(t => t.id === draggingId);
    draggingId = null;
    if (!todo) return;

    const oldStatus = todo.status;
    const oldLane = todo.swimlane || '';
    const targetLane = newLane || '';

    if (todo.status === newStatus && oldLane === targetLane) return;

    todo.status = newStatus;
    todo.swimlane = targetLane || null;
    render();

    try {
      const updates = { status: newStatus };
      if (oldLane !== targetLane) updates.swimlane = targetLane;

      const res = await fetch('/api/kanban/todos/' + todo.id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updates),
      });
      if (!res.ok) throw new Error('Server error ' + res.status);

      const label = newStatus.replace('_', ' ') + (targetLane ? ' / ' + targetLane : '');
      showToast('#' + pad(todo.id) + ' → ' + label);
    } catch (err) {
      todo.status = oldStatus;
      todo.swimlane = oldLane || null;
      render();
      showToast('Update failed — reverted');
    }
  }

  let editingTodoId = null;

  function openModal(todo) {
    editingTodoId = todo.id;
    cancelEdit();
    document.getElementById('modal-title').textContent =
      '#' + pad(todo.id) + ' — ' + todo.title;

    const metaEl = document.getElementById('modal-meta');
    metaEl.innerHTML = '';
    [
      todo.status ? todo.status.replace('_', ' ') : null,
      todo.priority,
      todo.swimlane || null,
      todo.project ? '⌥ ' + todo.project : null,
      todo.created ? 'created ' + todo.created : null,
      todo.completed ? 'completed ' + todo.completed : null,
    ].filter(Boolean).forEach(t => {
      const s = document.createElement('span');
      s.textContent = t;
      metaEl.appendChild(s);
    });

    renderModalPrereqs(todo.prereqIds || []);
    const prereqActions = document.getElementById('modal-prereq-actions');
    prereqActions.innerHTML = '<button class="modal-edit-btn" id="prereq-find-btn" onclick="findPrereqs()">Find prereqs</button>';

    const bodyWrap = document.getElementById('modal-body-wrap');
    bodyWrap.innerHTML = '<div class="modal-body-loading">Loading...</div>';
    document.getElementById('modal').classList.add('open');

    fetch('/api/kanban/todos/' + todo.id + '/raw')
      .then(r => r.json())
      .then(data => {
        const wrap = document.getElementById('modal-body-wrap');
        if (!wrap) return;
        if (data.body) {
          wrap.innerHTML =
            '<hr class="modal-divider">' +
            '<div class="modal-body">' + marked.parse(data.body) + '</div>';
        } else {
          wrap.innerHTML = '';
        }
      })
      .catch(() => {
        const wrap = document.getElementById('modal-body-wrap');
        if (wrap) wrap.innerHTML = '';
      });
  }

  function renderModalPrereqs(prereqIds) {
    const extra = document.getElementById('modal-extra');
    extra.innerHTML = '';
    if (prereqIds && prereqIds.length) {
      extra.innerHTML =
        '<div class="modal-section">' +
        '<div class="modal-section-label">Prerequisites</div>' +
        '<div class="modal-desc">' + prereqIds.map(function(p) { return '#' + parseInt(p, 10); }).filter(function(p) { return p !== '#NaN'; }).join(', ') + '</div>' +
        '</div>';
    }
  }

  async function findPrereqs() {
    const btn = document.getElementById('prereq-find-btn');
    if (!btn) return;
    const todoId = editingTodoId;
    btn.disabled = true;
    btn.textContent = 'Searching\u2026';
    try {
      const res = await fetch('/api/kanban/todos/' + todoId + '/prereqs', { method: 'POST' });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();
      if (editingTodoId !== todoId) return;
      const todo = todos.find(function(t) { return t.id === todoId; });
      if (todo) todo.prereqIds = data.prereqIds;
      renderModalPrereqs(data.prereqIds);
    } catch (err) {
      showToast('Prereq search failed');
    }
    btn.disabled = false;
    btn.textContent = 'Find prereqs';
  }

  function startEdit() {
    var todo = todos.find(function(t) { return t.id === editingTodoId; });
    if (!todo) return;
    document.getElementById('edit-title').value = todo.title;
    document.getElementById('edit-status').value = todo.status || 'pending';
    document.getElementById('edit-priority').value = todo.priority || 'medium';
    const slSel = document.getElementById('edit-swimlane');
    slSel.innerHTML = '<option value="">\u2014 none \u2014</option>' + swimlanes.map(l => `<option value="${esc(l)}">${esc(l)}</option>`).join('');
    slSel.value = todo.swimlane || '';
    document.getElementById('edit-assignee').value = todo.assignee || '';
    document.getElementById('edit-body').value = '';
    const epSel = document.getElementById('edit-project');
    if (epSel) epSel.value = todo.project || '';
    const ecSel = document.getElementById('edit-complexity');
    if (ecSel) { ecSel.value = todo.complexity || ''; updateComplexityHint('edit'); }
    fetch('/api/kanban/todos/' + todo.id + '/raw')
      .then(function(r) { return r.json(); })
      .then(function(data) { document.getElementById('edit-body').value = data.body || ''; });
    document.getElementById('modal-meta').style.display = 'none';
    document.getElementById('modal-extra').style.display = 'none';
    document.getElementById('modal-body-wrap').style.display = 'none';
    document.getElementById('modal-edit-btn').style.display = 'none';
    document.getElementById('modal-prereq-actions').style.display = 'none';
    document.getElementById('modal-edit-form').classList.add('active');
    document.getElementById('modal-title').textContent = 'Editing #' + pad(todo.id);
  }

  function cancelEdit() {
    document.getElementById('modal-meta').style.display = '';
    document.getElementById('modal-extra').style.display = '';
    document.getElementById('modal-body-wrap').style.display = '';
    document.getElementById('modal-edit-btn').style.display = '';
    document.getElementById('modal-prereq-actions').style.display = '';
    document.getElementById('modal-edit-form').classList.remove('active');
  }

  async function saveEdit() {
    var title = document.getElementById('edit-title').value.trim();
    var body = document.getElementById('edit-body').value;
    if (!title) { showToast('Title cannot be empty'); return; }
    var btn = document.getElementById('edit-save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving\u2026';
    try {
      var project = document.getElementById('edit-project').value;
      var status = document.getElementById('edit-status').value;
      var priority = document.getElementById('edit-priority').value;
      var swimlane = document.getElementById('edit-swimlane').value;
      var assignee = document.getElementById('edit-assignee').value;
      var complexity = document.getElementById('edit-complexity').value;
      var res = await fetch('/api/kanban/todos/' + editingTodoId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, project: project || null, status, priority, swimlane: swimlane || null, assignee: assignee || null, complexity: complexity || '' }),
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      var updated = await res.json();
      var idx = todos.findIndex(function(t) { return t.id === editingTodoId; });
      if (idx !== -1) todos[idx] = updated;
      render();
      closeModal();
      showToast('#' + pad(editingTodoId) + ' updated');
    } catch (err) {
      showToast('Save failed');
    }
    btn.disabled = false;
    btn.textContent = 'Save';
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); cancelEdit(); }
  function closeModalOverlay(e) { if (e.target.id === 'modal') closeModal(); }

  // ── Create panel ──────────────────────────────────────────────────────────────
  function openCreatePanel() {
    const sel = document.getElementById('cf-swimlane');
    sel.innerHTML = swimlanes.map(l => `<option value="${esc(l)}">${esc(l)}</option>`).join('');
    document.getElementById('create-overlay').classList.add('open');
    setTimeout(() => document.getElementById('cf-title').focus(), 50);
  }

  function closeCreatePanel() {
    document.getElementById('create-overlay').classList.remove('open');
    document.getElementById('create-form').reset();
  }

  function closeCreateOverlay(e) {
    if (e.target.id === 'create-overlay') closeCreatePanel();
  }

  async function submitCreate(e) {
    e.preventDefault();
    const title = document.getElementById('cf-title').value.trim();
    if (!title) return;
    const btn = document.getElementById('cf-submit');
    btn.disabled = true;
    btn.textContent = 'Creating…';
    try {
      const res = await fetch('/api/kanban/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title,
          priority: document.getElementById('cf-priority').value,
          swimlane: document.getElementById('cf-swimlane').value,
          description: document.getElementById('cf-desc').value.trim(),
          assignee: document.getElementById('cf-assignee').value || null,
          project: document.getElementById('cf-project').value || null,
          complexity: document.getElementById('cf-complexity').value || null,
        }),
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const todo = await res.json();
      closeCreatePanel();
      await load();
      showToast('#' + pad(todo.id) + ' created');
    } catch (err) {
      showToast('Failed to create todo');
    }
    btn.disabled = false;
    btn.textContent = 'Create Todo';
  }

  // ── Enrich inbox ──────────────────────────────────────────────────────────────
  async function enrichInbox() {
    const inboxCount = todos.filter(t => t.status === 'inbox').length;
    if (inboxCount === 0) {
      showToast('Nothing in Inbox to enrich');
      return;
    }
    const btn = document.getElementById('enrich-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Enriching…';
    try {
      const res = await fetch('/api/kanban/enrich', { method: 'POST' });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      await load();
      showToast(`Enriched ${data.enriched} todo${data.enriched !== 1 ? 's' : ''} (${data.found_context} with context)`);
    } catch (err) {
      showToast('Enrich failed');
    }
    btn.disabled = false;
    btn.textContent = '✨ Enrich Inbox';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function pad(id) { return String(id || '?').padStart(3, '0'); }

  initStatusCollapse();

  // ── Terminal ─────────────────────────────────────────────────────────────────
  let termSessionId = localStorage.getItem('term-session-id') || null;
  let termOpen = false;
  let termHistory = [];
  let termHistoryIdx = -1;

  function toggleTerminal() {
    termOpen = !termOpen;
    document.getElementById('term-panel').classList.toggle('open', termOpen);
    if (termOpen) {
      document.getElementById('term-input').focus();
      termScrollBottom();
    }
  }

  function termScrollBottom() {
    const el = document.getElementById('term-messages');
    setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
  }

  function termAddMsg(role, text, extra) {
    const wrap = document.getElementById('term-messages');
    const div = document.createElement('div');
    div.className = 'term-msg ' + role + (extra || '');
    div.innerHTML =
      '<span class="term-msg-label">' + (role === 'user' ? 'You' : 'Todo Creator') + '</span>' +
      '<span class="term-msg-bubble">' + esc(text) + '</span>';
    wrap.appendChild(div);
    termScrollBottom();
    return div;
  }

  async function termSend() {
    const input = document.getElementById('term-input');
    const btn = document.getElementById('term-send');
    const msg = input.value.trim();
    if (!msg) return;

    termHistory.unshift(msg);
    termHistoryIdx = -1;
    input.value = '';

    termAddMsg('user', msg);
    const thinking = termAddMsg('agent', 'Thinking…', ' thinking');
    btn.disabled = true;
    input.disabled = true;

    try {
      const res = await fetch('/api/kanban/agent/turn', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, sessionId: termSessionId }),
      });
      const data = await res.json();
      thinking.remove();
      if (data.error) {
        termAddMsg('agent', 'Error: ' + data.error);
      } else {
        termAddMsg('agent', data.text);
        if (data.sessionId) {
          termSessionId = data.sessionId;
          localStorage.setItem('term-session-id', termSessionId);
        }
      }
      // Refresh board in case a todo was created/updated
      load();
    } catch (e) {
      thinking.remove();
      termAddMsg('agent', 'Request failed. Is the indexer running?');
    }

    btn.disabled = false;
    input.disabled = false;
    input.focus();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('term-input');
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); termSend(); }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (termHistoryIdx < termHistory.length - 1) { termHistoryIdx++; input.value = termHistory[termHistoryIdx]; }
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (termHistoryIdx > 0) { termHistoryIdx--; input.value = termHistory[termHistoryIdx]; }
        else { termHistoryIdx = -1; input.value = ''; }
      }
    });
  });


  // ── Settings panel ────────────────────────────────────────────────────────
  async function openSettingsPanel() {
    document.getElementById('settings-overlay').classList.add('open');
    await loadSettingsData();
  }

  function closeSettingsPanel() {
    document.getElementById('settings-overlay').classList.remove('open');
    document.getElementById('settings-lane-input').value = '';
  }

  function closeSettingsOverlay(e) {
    if (e.target.id === 'settings-overlay') closeSettingsPanel();
  }

  async function loadSettingsData() {
    try {
      const [lanesRes, settingsRes] = await Promise.all([fetch('/api/kanban/swimlanes'), fetch('/api/kanban/settings')]);
      const lanes = await lanesRes.json();
      const settings = await settingsRes.json();
      renderSettingsSwimlanes(lanes);
      populateCronDropdowns(settings);
    } catch (e) {
      showToast('Failed to load settings');
    }
  }

  function renderSettingsSwimlanes(lanes) {
    const container = document.getElementById('settings-swimlane-chips');
    container.innerHTML = lanes.map(function(lane) {
      return '<span class="swimlane-chip">' +
        esc(lane) +
        '<span class="swimlane-chip-del" onclick="deleteSwimlane(\'' + esc(lane) + '\')" title="Remove lane">&times;</span>' +
        '</span>';
    }).join('');
  }

  async function addSwimlane() {
    const input = document.getElementById('settings-lane-input');
    const name = input.value.trim();
    if (!name) return;
    try {
      const res = await fetch('/api/kanban/swimlanes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'Failed to add swimlane'); return; }
      input.value = '';
      renderSettingsSwimlanes(data);
      swimlanes = data;
      showToast('Swimlane "' + name + '" added');
      render();
    } catch (e) {
      showToast('Failed to add swimlane');
    }
  }

  async function deleteSwimlane(name) {
    if (!confirm('Remove swimlane "' + name + '"?\n\nTodos in this lane will move to Uncategorized.')) return;
    try {
      const res = await fetch('/api/kanban/swimlanes/' + encodeURIComponent(name), { method: 'DELETE' });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'Cannot delete swimlane'); return; }
      renderSettingsSwimlanes(data);
      swimlanes = data;
      showToast('Swimlane "' + name + '" removed');
      render();
    } catch (e) {
      showToast('Failed to delete swimlane');
    }
  }

  function populateCronDropdowns(settings) {
    const hourSel = document.getElementById('cron-hour');
    const minSel = document.getElementById('cron-minute');
    hourSel.innerHTML = '';
    for (var i = 0; i < 24; i++) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = String(i).padStart(2, '0');
      if (i === settings.enrich_hour) opt.selected = true;
      hourSel.appendChild(opt);
    }
    minSel.innerHTML = '';
    for (var m = 0; m < 60; m += 5) {
      var opt2 = document.createElement('option');
      opt2.value = m;
      opt2.textContent = String(m).padStart(2, '0');
      if (m === settings.enrich_minute) opt2.selected = true;
      minSel.appendChild(opt2);
    }
    updateCronPreview();
  }

  function updateCronPreview() {
    var h = parseInt(document.getElementById('cron-hour').value, 10);
    var m = parseInt(document.getElementById('cron-minute').value, 10);
    var pad = function(n) { return String(n).padStart(2, '0'); };
    document.getElementById('cron-preview').textContent =
      'cron: ' + m + ' ' + h + ' * * *   (' + pad(h) + ':' + pad(m) + ' every day)';
  }

  async function saveCronSchedule() {
    var hour = parseInt(document.getElementById('cron-hour').value, 10);
    var minute = parseInt(document.getElementById('cron-minute').value, 10);
    var btn = document.getElementById('cron-save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving\u2026';
    try {
      const res = await fetch('/api/kanban/settings', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enrich_hour: hour, enrich_minute: minute }),
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'Failed to save schedule'); return; }
      var pad = function(n) { return String(n).padStart(2, '0'); };
      showToast('Schedule saved: ' + pad(data.enrich_hour) + ':' + pad(data.enrich_minute) + ' daily');
    } catch (e) {
      showToast('Failed to save schedule');
    }
    btn.disabled = false;
    btn.textContent = 'Save Schedule';
  }

  async function runEnrichNow() {
    var inboxCount = todos.filter(function(t) { return t.status === 'inbox'; }).length;
    if (inboxCount === 0) { showToast('Nothing in Inbox to enrich'); return; }
    closeSettingsPanel();
    await enrichInbox();
  }

  load();
  loadProjects();
  setInterval(load, 30000);
</script>

<button class="term-toggle" id="term-toggle" onclick="toggleTerminal()" style="display:none">
  <span class="term-dot"></span> Todo Assistant
</button>

<div class="term-panel" id="term-panel">
  <div class="term-header">
    <span class="term-header-dot"></span>
    <span class="term-title">Todo Creator</span>
    <span class="term-close" onclick="toggleTerminal()">×</span>
  </div>
  <div class="term-messages" id="term-messages">
    <div class="term-msg agent">
      <span class="term-msg-label">Todo Creator</span>
      <span class="term-msg-bubble">Hey! I can create todos, list what's pending, update statuses, or search the workspace. What do you need?</span>
    </div>
  </div>
  <div class="term-input-row">
    <input class="term-input" id="term-input" placeholder="e.g. create a todo: fix login bug, high priority, Dev" autocomplete="off" />
    <button class="term-send" id="term-send" onclick="termSend()">Send</button>
  </div>
</div>

</body>
</html>
