<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#282828">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Notes RAG">
  <link rel="apple-touch-icon" href="/ui/icon.png">
  <title>Projects — Workspace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #282828;
      --surface:   #32302f;
      --surface2:  #3c3836;
      --border:    #504945;
      --text:      #ebdbb2;
      --text-muted:#a89984;
      --accent:    #83a598;
      --green:     #b8bb26;
      --red:       #fb4934;
      --yellow:    #fabd2f;
      --tag-bg:    #3c3836;
      --radius:    12px;
    }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }
    .logo {
      width: 26px; height: 26px;
      background: var(--surface2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 16px; height: 16px; }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .back-link {
      margin-left: auto;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
    }
    .back-link:hover { color: var(--text); }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── List view ── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .page-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
    .btn-new {
      margin-left: auto;
      background: var(--accent);
      color: #282828;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.15s;
    }
    .btn-new:hover { opacity: 0.85; }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .project-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
    }
    .status-dot.active   { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .status-dot.paused   { background: var(--yellow); }
    .status-dot.complete { background: var(--accent); }
    .status-dot.archived { background: var(--border); }

    .card-goal {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }
    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-muted);
      padding: 1px 6px;
    }
    .tag.wing {
      color: var(--accent);
      border-color: #2d4a6a;
      background: #0d1b2a;
    }

    .loading-state {
      color: var(--text-muted);
      font-size: 13px;
      padding: 32px 0;
    }
    .empty-state {
      color: var(--text-muted);
      font-size: 13px;
      padding: 32px 0;
      text-align: center;
    }

    /* ── Detail view ── */
    #detail-view { display: none; }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 20px;
      background: none;
      border: none;
      padding: 0;
    }
    .detail-back:hover { color: var(--text); }
    .detail-back svg { width: 14px; height: 14px; }

    .detail-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .detail-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .btn-edit {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 3px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

    .detail-goal {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.55;
    }
    .detail-badges {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .badge.wing { color: var(--accent); border-color: #2d4a6a; background: #0d1b2a; }
    .badge.status-active   { color: var(--green);  border-color: #1a3a1a; background: #0d1a0d; }
    .badge.status-paused   { color: var(--yellow); border-color: #3a2a00; background: #1a1200; }
    .badge.status-complete { color: var(--accent); border-color: #2d4a6a; background: #0d1b2a; }
    .badge.status-archived { background: var(--surface2); }

    .status-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 3px 10px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .status-select:focus { outline: none; border-color: var(--accent); }
    .status-select.active   { color: var(--green);  border-color: #1a3a1a; background: #0d1a0d; }
    .status-select.paused   { color: var(--yellow); border-color: #3a2a00; background: #1a1200; }
    .status-select.complete { color: var(--accent); border-color: #2d4a6a; background: #0d1b2a; }
    .status-select.archived { background: var(--surface2); }

    .detail-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .detail-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .ct-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .ct-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-muted);
      padding: 3px 8px;
    }
    .repo-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .repo-link:hover { text-decoration: underline; }
    .doc-list { list-style: none; display: flex; flex-direction: column; gap: 5px; max-height: 115px; overflow-y: auto; padding-right: 2px; }
    .doc-list li a {
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
    }
    .doc-list li a:hover { color: var(--accent); }
    .tags-list { display: flex; flex-wrap: wrap; gap: 5px; }

    .detail-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .detail-summary h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .summary-body {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-muted);
      white-space: pre-wrap;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 520px;
      margin: 16px;
    }
    .modal h2 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 20px;
    }
    .form-field {
      margin-bottom: 16px;
    }
    .form-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 6px;
    }
    .form-field input,
    .form-field textarea,
    .form-field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 8px 10px;
    }
    .form-field input:focus,
    .form-field textarea:focus,
    .form-field select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-field textarea { resize: vertical; min-height: 70px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-field { flex: 1; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
    }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-save {
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: #282828;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-error {
      background: #2a0d0d;
      border: 1px solid #5a1a1a;
      border-radius: 6px;
      color: var(--red);
      font-size: 12px;
      padding: 8px 12px;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 600px) {
      .detail-sections { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
      main { padding: 20px 16px; }
      .form-row { flex-direction: column; gap: 0; }
    }

    /* ── Todos section ── */
    .todos-section { grid-column: 1 / -1; }
    .todo-group { margin-bottom: 10px; }
    .todo-group:last-child { margin-bottom: 0; }
    .todo-group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 4px 0;
      user-select: none;
    }
    .todo-group-header:hover { color: var(--text); }
    .todo-group-header .chevron {
      margin-left: auto;
      transition: transform 0.15s;
      width: 12px; height: 12px;
    }
    .todo-group-header.collapsed .chevron { transform: rotate(-90deg); }
    .todo-count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 0 6px;
      line-height: 17px;
    }
    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
      padding-right: 2px;
      margin-top: 4px;
    }
    .todo-list.collapsed { display: none; }
    .todo-item {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 2px 0;
    }
    .todo-item-id {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 10px;
      color: var(--border);
      flex-shrink: 0;
    }
    .todo-status-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    }
    .todo-status-dot.pending     { background: var(--text-muted); }
    .todo-status-dot.in_progress { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }
    .todo-status-dot.completed   { background: var(--green); }
    .todos-empty { font-size: 12px; color: var(--border); font-style: italic; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2"/>
      <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2"/>
      <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2"/>
      <rect x="9" y="9" width="5.5" height="5.5" rx="1.2"/>
    </svg>
  </div>
  <h1>Projects</h1>
  <a class="back-link" href="/">&#8592; Workspace</a>
</header>

<main>

  <!-- List view -->
  <div id="list-view">
    <div class="page-header">
      <span class="page-title">All Projects</span>
      <button class="btn-new" onclick="openModal()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/>
        </svg>
        New Project
      </button>
    </div>
    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" data-filter="complete" onclick="setFilter('complete', this)">Complete</button>
      <button class="filter-btn" data-filter="paused" onclick="setFilter('paused', this)">Paused</button>
      <button class="filter-btn" data-filter="archived" onclick="setFilter('archived', this)">Archived</button>
    </div>
    <div class="projects-grid" id="projects-grid">
      <div class="loading-state">Loading projects...</div>
    </div>
  </div>

  <!-- Detail view -->
  <div id="detail-view">
    <button class="detail-back" onclick="showList()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      All Projects
    </button>
    <div id="detail-content"></div>
  </div>

</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">New Project</h2>
    <div class="form-field">
      <label>Title <span style="color:var(--red)">*</span></label>
      <input type="text" id="f-title" placeholder="Project name" autocomplete="off">
    </div>
    <div class="form-field">
      <label>Goal</label>
      <textarea id="f-goal" placeholder="What is this project trying to achieve?"></textarea>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label>Status</label>
        <select id="f-status">
          <option value="active">Active</option>
          <option value="paused">Paused</option>
          <option value="complete">Complete</option>
          <option value="archived">Archived</option>
        </select>
      </div>
      <div class="form-field">
        <label>Wing</label>
        <input type="text" id="f-wing" placeholder="e.g. apps, infra">
      </div>
    </div>
    <div class="form-field">
      <label>Tags <span style="color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0">(comma-separated)</span></label>
      <input type="text" id="f-tags" placeholder="e.g. go, api, ct-111">
    </div>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveProject()">Save</button>
    </div>
  </div>
</div>

<script>
  let _projects = [];
  let _filter = 'all';
  let _editSlug = null; // null = create mode, slug string = edit mode

  async function loadProjects() {
    try {
      const res = await fetch('/api/projects');
      const data = await res.json();
      _projects = data.projects || [];
      renderList();
    } catch (err) {
      document.getElementById('projects-grid').innerHTML =
        '<div class="empty-state">Failed to load projects: ' + esc(String(err)) + '</div>';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setFilter(f, btn) {
    _filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    const grid = document.getElementById('projects-grid');
    const filtered = _filter === 'all'
      ? _projects
      : _projects.filter(p => p.status === _filter);

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-state">No projects found.</div>';
      return;
    }

    grid.innerHTML = filtered.map(p => `
      <div class="project-card" data-slug="${esc(p.slug)}" onclick="showDetail(this.dataset.slug)">
        <div class="card-top">
          <span class="card-title">${esc(p.title)}</span>
          <span class="status-dot ${esc(p.status)}" title="${esc(p.status)}"></span>
        </div>
        ${p.goal ? `<div class="card-goal">${esc(p.goal)}</div>` : ''}
        <div class="card-meta">
          ${p.wing ? `<span class="tag wing">${esc(p.wing)}</span>` : ''}
          ${(p.tags || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }

  async function showDetail(slug) {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('detail-content').innerHTML = '<div class="loading-state">Loading...</div>';
    history.pushState({ slug }, '', '/projects/' + slug);

    try {
      const res = await fetch('/api/projects/' + encodeURIComponent(slug));
      if (!res.ok) throw new Error('Not found');
      const p = await res.json();
      renderDetail(p);
    } catch (err) {
      document.getElementById('detail-content').innerHTML =
        '<div class="empty-state">Failed to load project: ' + esc(String(err)) + '</div>';
    }
  }

  async function renderDetail(p) {
    const containers = (p.containers || []).map(c =>
      `<span class="ct-chip">CT ${c}</span>`
    ).join('');
    const allDocs = [
      ...(p.docs || []),
      ...(p.related_docs || []).map(d => ({ ...d, auto: true })),
    ];
    const docs = allDocs.map(d =>
      `<li><a href="#" onclick="showDoc('${esc(d.path)}','${esc(d.label||d.path)}');return false">${esc(d.label || d.path)}</a></li>`
    ).join('');
    const tags = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');

    const statusOptions = ['active','paused','complete','archived']
      .map(s => `<option value="${s}"${s === p.status ? ' selected' : ''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`)
      .join('');

    const detailEl = document.getElementById('detail-content');
    detailEl.innerHTML = `
      <div class="detail-header-row">
        <div class="detail-title">${esc(p.title)}</div>
        <button class="btn-edit" onclick="openModal('${esc(p.slug)}')">Edit</button>
      </div>
      ${p.goal ? `<div class="detail-goal">${esc(p.goal)}</div>` : ''}
      <div class="detail-badges">
        <select class="status-select ${esc(p.status)}" onchange="patchStatus('${esc(p.slug)}', this)">
          ${statusOptions}
        </select>
        ${p.wing ? `<span class="badge wing">${esc(p.wing)}${p.room ? ' / ' + esc(p.room) : ''}</span>` : ''}
        ${p.repo ? `<a class="repo-link" href="https://github.com/${esc(p.repo)}" target="_blank" rel="noopener">&#8997; ${esc(p.repo)}</a>` : ''}
      </div>

      <div class="detail-sections">
        ${containers ? `
        <div class="detail-section">
          <div class="section-label">Containers</div>
          <div class="ct-chips">${containers}</div>
        </div>` : ''}

        ${allDocs.length ? `
        <div class="detail-section">
          <div class="section-label">Key Docs</div>
          <ul class="doc-list">${docs}</ul>
        </div>` : ''}

        ${tags ? `
        <div class="detail-section">
          <div class="section-label">Tags</div>
          <div class="tags-list">${tags}</div>
        </div>` : ''}
      </div>

      ${p.summary ? `
      <div class="detail-summary">
        <h2>Summary</h2>
        <div class="summary-body">${esc(p.summary)}</div>
      </div>` : ''}
    `;

    // Append todos section
    const todosSection = document.createElement('div');
    todosSection.className = 'detail-section todos-section';
    todosSection.innerHTML = '<div class="section-label">Todos</div><div style="font-size:12px;color:var(--text-muted)">Loading...</div>';
    detailEl.appendChild(todosSection);
    try {
      const tr = await fetch('/api/todos/by-project/' + encodeURIComponent(p.slug));
      const td = await tr.json();
      renderTodosSection(todosSection, td.todos || []);
    } catch(e) {
      todosSection.innerHTML = '<div class="section-label">Todos</div><div class="todos-empty">Failed to load todos</div>';
    }
  }

  function renderTodosSection(el, todos) {
    const groups = [
      { key: 'in_progress', label: 'In Progress' },
      { key: 'pending',     label: 'Pending' },
      { key: 'completed',   label: 'Completed' },
    ];
    const byStatus = {};
    for (const g of groups) byStatus[g.key] = todos.filter(t => t.status === g.key);
    const total = todos.length;

    let html = '<div class="section-label">Todos' + (total ? ' <span class="todo-count-badge">' + total + '</span>' : '') + '</div>';
    if (!total) {
      html += '<div class="todos-empty">No todos linked to this project</div>';
      el.innerHTML = html;
      return;
    }

    html += '<div>';
    for (const g of groups) {
      const items = byStatus[g.key];
      if (!items.length) continue;
      html += '<div class="todo-group">';
      html += '<div class="todo-group-header" onclick="toggleTodoGroup(this)">';
      html += '<span>' + esc(g.label) + '</span>';
      html += '<span class="todo-count-badge">' + items.length + '</span>';
      html += '<svg class="chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>';
      html += '</div>';
      html += '<ul class="todo-list">';
      for (const t of items) {
        html += '<li class="todo-item">';
        html += '<span class="todo-status-dot ' + esc(t.status) + '"></span>';
        html += '<span class="todo-item-id">#' + esc(String(t.id)) + '</span>';
        html += '<span>' + esc(t.title) + '</span>';
        html += '</li>';
      }
      html += '</ul></div>';
    }
    html += '</div>';
    el.innerHTML = html;
  }

  function toggleTodoGroup(header) {
    header.classList.toggle('collapsed');
    const list = header.nextElementSibling;
    list.classList.toggle('collapsed');
  }

  async function patchStatus(slug, selectEl) {
    const newStatus = selectEl.value;
    selectEl.className = 'status-select ' + newStatus;
    try {
      const res = await fetch('/api/projects/' + encodeURIComponent(slug), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
      if (!res.ok) throw new Error(await res.text());
      // Update cached copy
      const idx = _projects.findIndex(p => p.slug === slug);
      if (idx !== -1) _projects[idx].status = newStatus;
    } catch (err) {
      alert('Failed to update status: ' + err.message);
    }
  }

  // ── Modal ─────────────────────────────────────────────────────────────────

  function openModal(slug) {
    _editSlug = slug || null;
    const isEdit = !!slug;
    document.getElementById('modal-title').textContent = isEdit ? 'Edit Project' : 'New Project';
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('modal-error').textContent = '';

    if (isEdit) {
      const p = _projects.find(x => x.slug === slug);
      document.getElementById('f-title').value = p ? p.title : '';
      document.getElementById('f-goal').value = p ? (p.goal || '') : '';
      document.getElementById('f-status').value = p ? (p.status || 'active') : 'active';
      document.getElementById('f-wing').value = p ? (p.wing || '') : '';
      document.getElementById('f-tags').value = p ? (p.tags || []).join(', ') : '';
    } else {
      document.getElementById('f-title').value = '';
      document.getElementById('f-goal').value = '';
      document.getElementById('f-status').value = 'active';
      document.getElementById('f-wing').value = '';
      document.getElementById('f-tags').value = '';
    }

    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  async function saveProject() {
    const title = document.getElementById('f-title').value.trim();
    const goal  = document.getElementById('f-goal').value.trim();
    const status = document.getElementById('f-status').value;
    const wing  = document.getElementById('f-wing').value.trim();
    const tagsRaw = document.getElementById('f-tags').value.trim();
    const tags  = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

    const errEl = document.getElementById('modal-error');
    const saveBtn = document.getElementById('btn-save');

    if (!title) {
      errEl.textContent = 'Title is required.';
      errEl.style.display = 'block';
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';
    errEl.style.display = 'none';

    try {
      let res, updated;
      if (_editSlug) {
        res = await fetch('/api/projects/' + encodeURIComponent(_editSlug), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, goal, status, wing, tags }),
        });
      } else {
        res = await fetch('/api/projects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, goal, status, wing, tags }),
        });
      }

      if (!res.ok) {
        const body = await res.json().catch(() => ({ detail: 'Unknown error' }));
        throw new Error(body.detail || 'Request failed');
      }

      updated = await res.json();

      if (_editSlug) {
        const idx = _projects.findIndex(p => p.slug === _editSlug);
        if (idx !== -1) _projects[idx] = updated;
        else _projects.push(updated);
      } else {
        _projects.push(updated);
      }

      closeModal();
      renderList();

      // If we're in detail view and edited the current project, re-render
      if (_editSlug && location.pathname.includes('/projects/')) {
        renderDetail(updated);
      }
    } catch (err) {
      errEl.textContent = 'Error: ' + err.message;
      errEl.style.display = 'block';
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';
    }
  }

  // ── Navigation ────────────────────────────────────────────────────────────

  function showList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    history.pushState({}, '', '/projects');
  }

  window.addEventListener('popstate', (e) => {
    const slug = location.pathname.match(/^\/projects\/(.+)$/)?.[1];
    if (slug) {
      showDetail(decodeURIComponent(slug));
    } else {
      showList();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  const initSlug = location.pathname.match(/^\/projects\/(.+)$/)?.[1];
  loadProjects().then(() => {
    if (initSlug) showDetail(decodeURIComponent(initSlug));
  });
</script>

<!-- Doc viewer modal -->
<div class="modal-overlay" id="doc-modal-overlay" onclick="handleDocOverlayClick(event)">
  <div class="modal" style="max-width:700px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 id="doc-modal-title" style="margin:0"></h2>
      <button class="btn-cancel" onclick="closeDocModal()" style="padding:4px 10px">&#x2715;</button>
    </div>
    <div id="doc-modal-body" style="max-height:60vh;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px">
      <div class="loading-state">Loading...</div>
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--text-muted);font-family:'SF Mono','Fira Code',monospace" id="doc-modal-path"></div>
  </div>
</div>

<style>
  .md-body { font-size: 13px; line-height: 1.7; color: var(--text); }
  .md-body h1,.md-body h2,.md-body h3,.md-body h4 { color: var(--text); font-weight: 600; margin: 1.2em 0 0.4em; letter-spacing: -0.3px; }
  .md-body h1 { font-size: 18px; } .md-body h2 { font-size: 15px; } .md-body h3 { font-size: 13px; }
  .md-body p { margin: 0.5em 0; color: var(--text-muted); }
  .md-body ul,.md-body ol { padding-left: 1.4em; margin: 0.4em 0; color: var(--text-muted); }
  .md-body li { margin: 0.2em 0; }
  .md-body code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; font-family: 'SF Mono','Fira Code',monospace; font-size: 11px; padding: 1px 5px; }
  .md-body pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 0.6em 0; }
  .md-body pre code { background: none; border: none; padding: 0; font-size: 12px; }
  .md-body blockquote { border-left: 3px solid var(--border); margin: 0.6em 0; padding: 4px 12px; color: var(--text-muted); }
  .md-body a { color: var(--accent); text-decoration: none; }
  .md-body a:hover { text-decoration: underline; }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
  .md-body table { border-collapse: collapse; width: 100%; font-size: 12px; margin: 0.6em 0; }
  .md-body th,.md-body td { border: 1px solid var(--border); padding: 5px 10px; text-align: left; }
  .md-body th { background: var(--surface2); color: var(--text); font-weight: 600; }
  .md-body td { color: var(--text-muted); }
</style>

<script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
<script>
  async function showDoc(path, label) {
    document.getElementById('doc-modal-title').textContent = label;
    document.getElementById('doc-modal-path').textContent = path;
    document.getElementById('doc-modal-body').innerHTML = '<div class="loading-state">Loading...</div>';
    document.getElementById('doc-modal-overlay').classList.add('open');
    try {
      const res = await fetch('/api/workspace/' + encodeURIComponent(path).replace(/%2F/g, '/'));
      if (!res.ok) throw new Error('Not found');
      const data = await res.json();
      const isMarkdown = path.toLowerCase().endsWith('.md');
      if (isMarkdown && typeof marked !== 'undefined') {
        document.getElementById('doc-modal-body').innerHTML =
          '<div class="md-body">' + marked.parse(data.content) + '</div>';
      } else {
        document.getElementById('doc-modal-body').innerHTML =
          '<pre style="white-space:pre-wrap;font-size:12px;line-height:1.6;color:var(--text-muted);font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif">' +
          esc(data.content) + '</pre>';
      }
    } catch (err) {
      document.getElementById('doc-modal-body').innerHTML =
        '<div class="empty-state">Failed to load: ' + esc(String(err)) + '</div>';
    }
  }
  function closeDocModal() {
    document.getElementById('doc-modal-overlay').classList.remove('open');
  }
  function handleDocOverlayClick(e) {
    if (e.target === document.getElementById('doc-modal-overlay')) closeDocModal();
  }
</script>
