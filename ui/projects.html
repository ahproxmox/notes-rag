<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Notes RAG">
  <link rel="apple-touch-icon" href="/ui/icon.png">
  <title>Projects — Workspace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #d29922;
      --tag-bg:    #21262d;
      --radius:    12px;
    }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }
    .logo {
      width: 26px; height: 26px;
      background: var(--surface2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 16px; height: 16px; }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .back-link {
      margin-left: auto;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
    }
    .back-link:hover { color: var(--text); }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── List view ── */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .page-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 12px;
      padding: 4px 12px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .project-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
    }
    .status-dot.active   { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .status-dot.paused   { background: var(--yellow); }
    .status-dot.complete { background: var(--accent); }
    .status-dot.archived { background: var(--border); }

    .card-goal {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }
    .tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      color: var(--text-muted);
      padding: 1px 6px;
    }
    .tag.wing {
      color: var(--accent);
      border-color: #2d4a6a;
      background: #0d1b2a;
    }

    .loading-state {
      color: var(--text-muted);
      font-size: 13px;
      padding: 32px 0;
    }
    .empty-state {
      color: var(--text-muted);
      font-size: 13px;
      padding: 32px 0;
      text-align: center;
    }

    /* ── Detail view ── */
    #detail-view { display: none; }

    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 20px;
      background: none;
      border: none;
      padding: 0;
    }
    .detail-back:hover { color: var(--text); }
    .detail-back svg { width: 14px; height: 14px; }

    .detail-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .detail-goal {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.55;
    }
    .detail-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
    }
    .badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    .badge.wing { color: var(--accent); border-color: #2d4a6a; background: #0d1b2a; }
    .badge.status-active   { color: var(--green);  border-color: #1a3a1a; background: #0d1a0d; }
    .badge.status-paused   { color: var(--yellow); border-color: #3a2a00; background: #1a1200; }
    .badge.status-complete { color: var(--accent); border-color: #2d4a6a; background: #0d1b2a; }
    .badge.status-archived { background: var(--surface2); }

    .detail-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .detail-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .ct-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .ct-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-muted);
      padding: 3px 8px;
    }
    .repo-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .repo-link:hover { text-decoration: underline; }
    .doc-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .doc-list li a {
      color: var(--text-muted);
      font-size: 12px;
      text-decoration: none;
    }
    .doc-list li a:hover { color: var(--accent); }
    .tags-list { display: flex; flex-wrap: wrap; gap: 5px; }

    .detail-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .detail-summary h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .summary-body {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-muted);
      white-space: pre-wrap;
    }

    @media (max-width: 600px) {
      .detail-sections { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
      main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.2"/>
      <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.2"/>
      <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.2"/>
      <rect x="9" y="9" width="5.5" height="5.5" rx="1.2"/>
    </svg>
  </div>
  <h1>Projects</h1>
  <a class="back-link" href="/">← Workspace</a>
</header>

<main>

  <!-- List view -->
  <div id="list-view">
    <div class="filter-row" id="filter-row">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" data-filter="complete" onclick="setFilter('complete', this)">Complete</button>
      <button class="filter-btn" data-filter="paused" onclick="setFilter('paused', this)">Paused</button>
      <button class="filter-btn" data-filter="archived" onclick="setFilter('archived', this)">Archived</button>
    </div>
    <div class="projects-grid" id="projects-grid">
      <div class="loading-state">Loading projects...</div>
    </div>
  </div>

  <!-- Detail view -->
  <div id="detail-view">
    <button class="detail-back" onclick="showList()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      All Projects
    </button>
    <div id="detail-content"></div>
  </div>

</main>

<script>
  let _projects = [];
  let _filter = 'all';

  async function loadProjects() {
    try {
      const res = await fetch('/api/projects');
      const data = await res.json();
      _projects = data.projects || [];
      renderList();
    } catch (err) {
      document.getElementById('projects-grid').innerHTML =
        '<div class="empty-state">Failed to load projects: ' + esc(String(err)) + '</div>';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setFilter(f, btn) {
    _filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    const grid = document.getElementById('projects-grid');
    const filtered = _filter === 'all'
      ? _projects
      : _projects.filter(p => p.status === _filter);

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-state">No projects found.</div>';
      return;
    }

    grid.innerHTML = filtered.map(p => `
      <div class="project-card" onclick="showDetail(${JSON.stringify(esc(p.slug))})">
        <div class="card-top">
          <span class="card-title">${esc(p.title)}</span>
          <span class="status-dot ${esc(p.status)}" title="${esc(p.status)}"></span>
        </div>
        ${p.goal ? `<div class="card-goal">${esc(p.goal)}</div>` : ''}
        <div class="card-meta">
          ${p.wing ? `<span class="tag wing">${esc(p.wing)}</span>` : ''}
          ${(p.tags || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }

  async function showDetail(slug) {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('detail-content').innerHTML = '<div class="loading-state">Loading...</div>';
    history.pushState({ slug }, '', '/projects/' + slug);

    try {
      const res = await fetch('/api/projects/' + encodeURIComponent(slug));
      if (!res.ok) throw new Error('Not found');
      const p = await res.json();
      renderDetail(p);
    } catch (err) {
      document.getElementById('detail-content').innerHTML =
        '<div class="empty-state">Failed to load project: ' + esc(String(err)) + '</div>';
    }
  }

  function renderDetail(p) {
    const statusClass = 'status-' + (p.status || 'active');
    const containers = (p.containers || []).map(c =>
      `<span class="ct-chip">CT ${c}</span>`
    ).join('');
    const docs = (p.docs || []).map(d =>
      `<li><a href="#">${esc(d.label || d.path)}</a></li>`
    ).join('');
    const tags = (p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-title">${esc(p.title)}</div>
      ${p.goal ? `<div class="detail-goal">${esc(p.goal)}</div>` : ''}
      <div class="detail-badges">
        <span class="badge ${statusClass}">${esc(p.status || 'active')}</span>
        ${p.wing ? `<span class="badge wing">${esc(p.wing)}${p.room ? ' / ' + esc(p.room) : ''}</span>` : ''}
        ${p.repo ? `<a class="repo-link" href="https://github.com/${esc(p.repo)}" target="_blank" rel="noopener">⌥ ${esc(p.repo)}</a>` : ''}
      </div>

      <div class="detail-sections">
        ${containers ? `
        <div class="detail-section">
          <div class="section-label">Containers</div>
          <div class="ct-chips">${containers}</div>
        </div>` : ''}

        ${docs ? `
        <div class="detail-section">
          <div class="section-label">Key Docs</div>
          <ul class="doc-list">${docs}</ul>
        </div>` : ''}

        ${tags ? `
        <div class="detail-section">
          <div class="section-label">Tags</div>
          <div class="tags-list">${tags}</div>
        </div>` : ''}
      </div>

      ${p.summary ? `
      <div class="detail-summary">
        <h2>Summary</h2>
        <div class="summary-body">${esc(p.summary)}</div>
      </div>` : ''}
    `;
  }

  function showList() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    history.pushState({}, '', '/projects');
  }

  // Handle direct navigation to /projects/:slug
  window.addEventListener('popstate', (e) => {
    const slug = location.pathname.match(/^\/projects\/(.+)$/)?.[1];
    if (slug) {
      showDetail(decodeURIComponent(slug));
    } else {
      showList();
    }
  });

  // On load, check if we're on a detail URL
  const initSlug = location.pathname.match(/^\/projects\/(.+)$/)?.[1];
  loadProjects().then(() => {
    if (initSlug) showDetail(decodeURIComponent(initSlug));
  });
</script>
</body>
</html>
