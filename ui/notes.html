<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Notes RAG">
  <link rel="apple-touch-icon" href="/ui/icon.png">
  <title>Search — Notes RAG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --border:    #30363d;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --accent:    #58a6ff;
      --tag-bg:    #21262d;
      --green:     #3fb950;
      --radius:    8px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100%;
      font-size: 14px;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    #home-btn {
      background: var(--tag-bg); border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; padding: 5px 12px; font-size: 12px; text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    #home-btn:hover { border-color: var(--accent); color: var(--text); }

    .search-bar {
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .search-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .results-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }
    .results-area::-webkit-scrollbar { width: 6px; }
    .results-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      margin-top: 60px;
    }
    .empty-state h2 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; }

    .msg { padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; }
    .msg.error { color: #f85149; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .result-card:hover { border-color: var(--accent); }
    .result-top { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .result-title { font-size: 14px; font-weight: 600; flex: 1; }
    .score-bar { width: 36px; height: 3px; background: var(--border); border-radius: 2px; flex-shrink: 0; }
    .score-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; }
    .result-filename { font-size: 11px; color: var(--text-muted); font-family: 'SF Mono', monospace; margin-bottom: 6px; }
    .result-snippet { font-size: 12px; color: var(--text-muted); line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .overlay.open { display: block; }

    .drawer {
      position: fixed;
      top: 0; right: 0;
      width: 45%;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.2s ease;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .close-btn {
      background: var(--tag-bg); border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px; flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .close-btn:hover { border-color: var(--accent); color: var(--text); }

    .editor {
      flex: 1;
      background: var(--bg);
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      padding: 16px;
      resize: none;
      line-height: 1.6;
    }
    .editor:disabled { opacity: 0.5; }

    .drawer-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .save-status { flex: 1; font-size: 12px; color: var(--text-muted); }
    .save-btn {
      background: var(--tag-bg); border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; padding: 8px 18px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .save-btn.dirty { background: var(--accent); border-color: var(--accent); color: #0d1117; }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .drawer { width: 100%; border-left: none; }
      .results-area { padding: 12px 16px; }
      .search-bar { padding: 12px 16px; }
      header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Search Notes</h1>
  <a href="/" id="home-btn">&#8592; Home</a>
</header>

<div class="search-bar">
  <input class="search-input" id="query" type="text" placeholder="Search your notes&#8230;" autocomplete="off">
  <button class="search-btn" id="search-btn">Search</button>
</div>

<div class="results-area" id="results">
  <div class="empty-state" id="empty-state">
    <h2>Search your workspace</h2>
    <p>Type a keyword and hit Search to find relevant notes.</p>
  </div>
</div>

<div class="overlay" id="overlay"></div>

<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">Note</span>
    <button class="close-btn" id="close-btn">&#10005; Close</button>
  </div>
  <textarea class="editor" id="editor" placeholder="Loading&#8230;"></textarea>
  <div class="drawer-footer">
    <span class="save-status" id="save-status"></span>
    <button class="save-btn" id="save-btn" disabled>Save</button>
  </div>
</div>

<script>
  var currentFilename = null;
  var originalBody = '';

  var queryEl    = document.getElementById('query');
  var searchBtn  = document.getElementById('search-btn');
  var resultsEl  = document.getElementById('results');
  var overlay    = document.getElementById('overlay');
  var drawer     = document.getElementById('drawer');
  var drawerTitle = document.getElementById('drawer-title');
  var editor     = document.getElementById('editor');
  var saveBtn    = document.getElementById('save-btn');
  var saveStatus = document.getElementById('save-status');
  var closeBtn   = document.getElementById('close-btn');

  searchBtn.addEventListener('click', doSearch);
  queryEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
  queryEl.addEventListener('input', function() {
    if (!queryEl.value.trim()) loadRecent();
  });
  closeBtn.addEventListener('click', closeDrawer);
  overlay.addEventListener('click', closeDrawer);
  saveBtn.addEventListener('click', saveNote);
  editor.addEventListener('input', function() {
    var dirty = editor.value !== originalBody;
    saveBtn.classList.toggle('dirty', dirty);
    saveStatus.textContent = dirty ? 'Unsaved changes' : '';
  });

  function loadRecent() {
    resultsEl.innerHTML = '<div class="msg">Loading\u2026</div>';
    fetch('/api/notes/recent?n=10')
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    })
    .then(function(data) { renderResults(data.results, true); })
    .catch(function() {
      resultsEl.innerHTML = '<div class="empty-state" id="empty-state"><h2>Search your workspace</h2><p>Type a keyword and hit Search to find relevant notes.</p></div>';
    });
  }

  function doSearch() {
    var query = queryEl.value.trim();
    if (!query) return;
    searchBtn.disabled = true;
    resultsEl.innerHTML = '<div class="msg">Searching\u2026</div>';
    fetch('/api/notes/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: query}),
    })
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    })
    .then(function(data) { renderResults(data.results, false); })
    .catch(function(err) {
      resultsEl.innerHTML = '<div class="msg error">Error: ' + escHtml(err.message) + '</div>';
    })
    .finally(function() { searchBtn.disabled = false; });
  }

  loadRecent();

  function renderResults(results, isRecent) {
    if (!results || results.length === 0) {
      resultsEl.innerHTML = '<div class="msg">' + (isRecent ? 'No notes yet.' : 'No notes found.') + '</div>';
      return;
    }
    resultsEl.innerHTML = '';
    if (isRecent) {
      var label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = 'Recently modified';
      resultsEl.appendChild(label);
    }
    var maxScore = isRecent ? 1 : Math.max.apply(null, results.map(function(r) { return r.score || 0; }).concat([0.001]));
    results.forEach(function(r) {
      var card = document.createElement('div');
      card.className = 'result-card';
      var scoreBar = isRecent ? '' :
        '<div class="score-bar"><div class="score-bar-fill" style="width:' + Math.round(((r.score || 0) / maxScore) * 100) + '%"></div></div>';
      card.innerHTML =
        '<div class="result-top">' +
          '<span class="result-title">' + escHtml(r.title) + '</span>' +
          scoreBar +
        '</div>' +
        '<div class="result-filename">' + escHtml(r.filename) + '</div>' +
        '<div class="result-snippet">' + escHtml(r.snippet) + '</div>';
      card.addEventListener('click', function() { openNote(r.filename, r.title); });
      resultsEl.appendChild(card);
    });
  }

  function openNote(filename, title) {
    currentFilename = filename;
    drawerTitle.textContent = title;
    editor.value = '';
    editor.placeholder = 'Loading\u2026';
    editor.disabled = true;
    saveBtn.disabled = true;
    saveBtn.classList.remove('dirty');
    saveStatus.textContent = '';
    openDrawer();
    fetch('/api/notes/' + encodeURIComponent(filename))
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    })
    .then(function(data) {
      editor.value = data.body;
      originalBody = data.body;
      editor.placeholder = '';
      editor.disabled = false;
      saveBtn.disabled = false;
      editor.focus();
    })
    .catch(function(err) {
      editor.placeholder = 'Error loading note: ' + err.message;
    });
  }

  function saveNote() {
    if (!currentFilename || saveBtn.disabled) return;
    saveBtn.disabled = true;
    saveStatus.textContent = 'Saving\u2026';
    fetch('/api/notes/' + encodeURIComponent(currentFilename), {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({body: editor.value}),
    })
    .then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      originalBody = editor.value;
      saveBtn.classList.remove('dirty');
      saveStatus.textContent = 'Saved \u2713';
      setTimeout(function() {
        if (saveStatus.textContent === 'Saved \u2713') saveStatus.textContent = '';
      }, 2500);
    })
    .catch(function(err) { saveStatus.textContent = 'Error: ' + err.message; })
    .finally(function() { saveBtn.disabled = false; });
  }

  function openDrawer() {
    drawer.classList.add('open');
    overlay.classList.add('open');
  }

  function closeDrawer() {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
    currentFilename = null;
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
