# Notes RAG — Evaluation Queries
#
# Each query has:
#   - id: unique numeric ID
#   - category: factual | reasoning | security | multi-hop | edge-case | temporal
#   - query: the search string
#   - expected: what the answer must contain (terms for 'contains', ignored for 'refuse')
#   - expected_sources: filenames that SHOULD appear in retrieved results (for IR metrics)
#   - max_score: points available (usually 2)
#   - scoring: how to judge (contains, refuse)
#
# Run with: python bench/run_bench.py
# Score with: python bench/score.py

