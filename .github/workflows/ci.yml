name: CI

on:
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Python syntax check
        run: python3 -m py_compile api/app.py core/search.py infra/watcher.py core/indexer.py main.py features/research.py

      - name: Bench suite syntax check
        run: python3 -m py_compile bench/run_bench.py bench/score.py
